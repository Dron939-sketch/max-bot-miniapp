<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Фреди | Премиум виртуальный психолог</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black-obsidian: #0a0a0a;
            --black-matte: #111111;
            --carbon-fiber: #1a1a1a;
            --glass-dark: rgba(10, 10, 10, 0.85);
            
            --chrome: #e0e0e0;
            --silver-metallic: #c0c0c0;
            --silver-brushed: #b0b0b0;
            --platinum: #a0a0a0;
            
            --amg-red: #ff3b3b;
            --amg-orange: #ff6b3b;
            --amg-blue: #3b82ff;
            --amber: #ffb83b;
            
            --glass-gradient: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(26, 26, 26, 0.85) 100%);
            --chrome-gradient: linear-gradient(135deg, #e0e0e0 0%, #b0b0b0 50%, #e0e0e0 100%);
            
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-chrome: 0 5px 15px rgba(192, 192, 192, 0.2);
            
            --text-primary: #ffffff;
            --text-secondary: #a0a3b0;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black-obsidian);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Премиум фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(224, 224, 224, 0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(255, 59, 59, 0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(224, 224, 224, 0.008) 0px, rgba(224, 224, 224, 0.008) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* Левая панель */
        .chats-panel {
            width: 320px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(224, 224, 224, 0.15);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }

        .chats-header {
            padding: 28px 20px 20px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
            position: relative;
        }

        .chats-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .chats-title {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome) 0%, var(--silver-brushed) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            gap: 14px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(224, 224, 224, 0.05);
            border-color: rgba(224, 224, 224, 0.2);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.08), rgba(192, 192, 192, 0.03));
            border-color: rgba(224, 224, 224, 0.3);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 15px rgba(224, 224, 224, 0.2);
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--black-obsidian);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chats-footer {
            padding: 20px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 20px;
            background: rgba(224, 224, 224, 0.03);
            cursor: pointer;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .user-mini-profile:hover {
            background: rgba(224, 224, 224, 0.08);
        }

        .user-mini-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--black-obsidian);
        }

        .user-mini-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-mini-status {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Правая панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid rgba(224, 224, 224, 0.2);
            font-size: 24px;
            color: var(--chrome);
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .chat-header-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px rgba(224, 224, 224, 0.2);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(224, 224, 224, 0.2); }
            50% { box-shadow: 0 0 25px rgba(224, 224, 224, 0.4); }
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.3px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulseMode 2s infinite;
        }

        @keyframes pulseMode {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        /* Скролл */
        .screen-container::-webkit-scrollbar,
        .chats-list::-webkit-scrollbar {
            width: 4px;
        }

        .screen-container::-webkit-scrollbar-track,
        .chats-list::-webkit-scrollbar-track {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 4px;
        }

        .screen-container::-webkit-scrollbar-thumb,
        .chats-list::-webkit-scrollbar-thumb {
            background: var(--chrome);
            border-radius: 4px;
        }

        /* Дашборд */
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.05), rgba(192, 192, 192, 0.02));
            border-radius: 32px;
            padding: 32px 36px;
            margin-bottom: 32px;
            border: 1px solid rgba(224, 224, 224, 0.15);
            backdrop-filter: blur(15px);
            position: relative;
            text-align: center;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .greeting-text h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .greeting-text p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .profile-badge {
            display: inline-block;
            background: rgba(224, 224, 224, 0.05);
            border-radius: 40px;
            padding: 10px 28px;
            margin-top: 20px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .profile-code {
            font-family: monospace;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Голосовая кнопка AMG стиль */
        .voice-main {
            margin-bottom: 48px;
        }

        .voice-card-premium {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7), rgba(26, 26, 26, 0.6));
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 8px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            box-shadow: var(--shadow-premium);
        }

        .voice-record-btn-main {
            width: 100%;
            padding: 32px 40px;
            border-radius: 72px;
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.08), rgba(192, 192, 192, 0.03));
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 20px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .voice-record-btn-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(224, 224, 224, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .voice-record-btn-main:hover::before {
            left: 100%;
        }

        .voice-record-btn-main .voice-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 10px rgba(224, 224, 224, 0.5));
        }

        .voice-record-btn-main:hover {
            transform: scale(1.01);
            border-color: rgba(224, 224, 224, 0.4);
        }

        .voice-record-btn-main.recording {
            background: linear-gradient(135deg, rgba(255, 59, 59, 0.2), rgba(239, 68, 68, 0.1));
            border-color: var(--amg-red);
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.3); }
            50% { box-shadow: 0 0 0 20px rgba(255, 59, 59, 0); }
        }

        .voice-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* Селектор режимов */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 48px;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .mode-btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.15), rgba(192, 192, 192, 0.05));
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(224, 224, 224, 0.1);
        }

        /* Модули */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }

        .module-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(224, 224, 224, 0.1);
            text-align: center;
            position: relative;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .module-card:hover::before {
            transform: translateX(100%);
        }

        .module-card:hover {
            transform: translateY(-6px);
            border-color: rgba(224, 224, 224, 0.3);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .module-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .module-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .module-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Быстрые действия */
        .quick-actions {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 24px;
            font-size: 18px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .quick-action {
            background: rgba(224, 224, 224, 0.03);
            border-radius: 24px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-action:hover {
            background: rgba(224, 224, 224, 0.08);
            border-color: rgba(224, 224, 224, 0.3);
            transform: translateY(-3px);
        }

        .action-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .action-name {
            font-size: 13px;
            font-weight: 500;
        }

        /* Сообщения чата с форматированием */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 24px;
        }

        .message {
            max-width: 85%;
            padding: 18px 24px;
            border-radius: 28px;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            line-height: 1.5;
        }

        .message.user {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.12), rgba(192, 192, 192, 0.06));
            align-self: flex-end;
            border-radius: 28px 28px 8px 28px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .message.bot {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.6), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(10px);
            align-self: flex-start;
            border-radius: 28px 28px 28px 8px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .message.system {
            background: rgba(224, 224, 224, 0.03);
            align-self: center;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 90%;
        }

        /* Форматирование текста в сообщениях */
        .message h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 12px 0 8px;
            color: var(--chrome);
        }

        .message h4 {
            font-size: 16px;
            font-weight: 600;
            margin: 10px 0 6px;
            color: var(--silver-metallic);
        }

        .message strong {
            color: var(--chrome);
        }

        .message em {
            color: var(--silver-brushed);
            font-style: italic;
        }

        .message ul, .message ol {
            margin: 8px 0 8px 20px;
        }

        .message li {
            margin: 4px 0;
        }

        .message p {
            margin: 8px 0;
        }

        .message hr {
            margin: 12px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .message blockquote {
            border-left: 3px solid var(--chrome);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
        }

        .message audio {
            margin-top: 12px;
            width: 100%;
            height: 40px;
            border-radius: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Всплывающие сообщения */
        .floating-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .floating-message-content {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .floating-message.success .floating-message-content {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9));
        }

        .floating-message.error .floating-message-content {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
        }

        .floating-message.warning .floating-message-content {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.9), rgba(217, 119, 6, 0.9));
        }

        .recording-timer-global {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .voice-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            padding: 14px;
            background: rgba(10, 10, 10, 0.6);
            border-radius: 40px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--amg-red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .loading-spinner {
            font-size: 64px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -280px;
                width: 280px;
                z-index: 100;
                height: 100%;
            }
            
            .chats-panel.open {
                left: 0;
            }
            
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .screen-container {
                padding: 20px 16px;
            }
            
            .hero-section {
                padding: 24px 20px;
            }
            
            .greeting-text h2 {
                font-size: 24px;
            }
            
            .modules-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .quick-actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .mode-btn span:first-child {
                display: none;
            }
            
            .mode-btn {
                padding: 12px;
            }
            
            .message {
                max-width: 95%;
            }
            
            .voice-record-btn-main {
                padding: 24px 28px;
            }

                { id: 'trauma', name: 'Исцеление', icon: '🕊️', desc: 'Проработка опыта' },

        // Состояние

        // ========== API ВЫЗОВЫ ==========
        
        async function apiCall(endpoint, options = {}) {
            const url = endpoint.startsWith('http') ? endpoint : `${CONFIG.API_BASE_URL}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            // Добавляем таймаут
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            try {
                const response = await fetch(url, { 
                    ...options, 
                    headers, 
                    signal: controller.signal 
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                return data;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('Превышено время ожидания');
                }
                console.error(`API Error: ${endpoint}`, error);
                throw error;
            }
        }
        
        async function saveMode(mode) {
            try {
                await apiCall('/api/save-mode', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: CONFIG.USER_ID, mode })
                });
            } catch (error) {
                console.warn('Не удалось сохранить режим', error);
            }
        }
        
        async function getBotResponse(question) {
            try {
                const response = await apiCall('/api/chat/action', {
                    method: 'POST',
                    body: JSON.stringify({
                        user_id: CONFIG.USER_ID,
                        action: 'ask_question',
                        data: { question }
                    })
                });
                return response.data?.message || 'Я вас слушаю. Расскажите подробнее.';
            } catch (error) {
                console.error('Get bot response error:', error);
                return 'Извините, произошла ошибка. Попробуйте позже.';
            }
        }
        
        async function sendVoiceToServer(audioBlob) {
            const formData = new FormData();
            formData.append('user_id', CONFIG.USER_ID);
            formData.append('voice', audioBlob, 'voice.webm');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 45000);
                
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/voice/process`, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return await response.json();
            } catch (error) {
                console.error('Send voice error:', error);
                if (error.name === 'AbortError') {
                    return { success: false, error: 'Превышено время ожидания ответа' };
                }
                return { success: false, error: 'Ошибка отправки голоса' };
            }
        }
        
        async function textToSpeech(text, mode) {
            try {
                const response = await apiCall('/api/tts', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode })
                });
                return response;
            } catch (error) {
                console.error('TTS error:', error);
                return null;
            }
        }
        
        async function getUserStatus() {
            try {
                return await apiCall(`/api/user-status?user_id=${CONFIG.USER_ID}`);

                console.warn('Failed to get user status', error);
                return { has_profile: true, test_completed: true, profile_code: CONFIG.PROFILE_CODE };
            }
        }
        
        async function getPsychologistThought() {
            try {
                const data = await apiCall(`/api/thought?user_id=${CONFIG.USER_ID}`);
                return data.thought;
            } catch (error) {
                console.warn('Failed to get thought', error);
                return null;
            }
        }
        
        async function getWeekendIdeas() {
            try {
                const data = await apiCall(`/api/ideas?user_id=${CONFIG.USER_ID}`);
                return data.ideas || [];
            } catch (error) {
                console.warn('Failed to get ideas', error);
                return [];
            }
        }
        
        async function generateNewThought() {
            try {
                const data = await apiCall('/api/psychologist-thoughts/generate', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: CONFIG.USER_ID })
                });
                return data.thought;
            } catch (error) {
                console.warn('Failed to generate thought', error);
                return null;
            }
        }
        
        async function getProfile() {
            try {
                const data = await apiCall(`/api/get-profile?user_id=${CONFIG.USER_ID}`);
                return data;
            } catch (error) {
                console.warn('Failed to get profile', error);
                return null;
            }
        }
        
        // ========== ФОРМАТИРОВАНИЕ ТЕКСТА ==========
        
        function formatMessageText(text) {
            if (!text) return '';
            
            // Эмодзи в заголовках
            text = text.replace(/🔑\s*КЛЮЧЕВАЯ ХАРАКТЕРИСТИКА/gi, '🔑 <strong>КЛЮЧЕВАЯ ХАРАКТЕРИСТИКА</strong>');
            text = text.replace(/💪\s*СИЛЬНЫЕ СТОРОНЫ/gi, '💪 <strong>СИЛЬНЫЕ СТОРОНЫ</strong>');
            text = text.replace(/🎯\s*ЗОНЫ РОСТА/gi, '🎯 <strong>ЗОНЫ РОСТА</strong>');
            text = text.replace(/🌱\s*КАК ЭТО СФОРМИРОВАЛОСЬ/gi, '🌱 <strong>КАК ЭТО СФОРМИРОВАЛОСЬ</strong>');
            text = text.replace(/⚠️\s*ГЛАВНАЯ ЛОВУШКА/gi, '⚠️ <strong>ГЛАВНАЯ ЛОВУШКА</strong>');
            text = text.replace(/🔐\s*КЛЮЧЕВОЙ ЭЛЕМЕНТ/gi, '🔐 <strong>КЛЮЧЕВОЙ ЭЛЕМЕНТ</strong>');
            text = text.replace(/🔄\s*ПЕТЛЯ/gi, '🔄 <strong>ПЕТЛЯ</strong>');
            text = text.replace(/🚪\s*ТОЧКА ВХОДА/gi, '🚪 <strong>ТОЧКА ВХОДА</strong>');
            text = text.replace(/📊\s*ПРОГНОЗ/gi, '📊 <strong>ПРОГНОЗ</strong>');
            
            // Разбивка на абзацы
            text = text.replace(/\n\n/g, '</p><p>');
            text = `<p>${text}</p>`;
            
            // Списки
            text = text.replace(/•\s/g, '<br>• ');
            text = text.replace(/\n•/g, '<br>•');
            
            // Жирный текст
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.*?)__/g, '<strong>$1</strong>');
            
            // Курсив
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Горизонтальная линия
            text = text.replace(/---/g, '<hr>');
            
            return text;
        }
        
        // ========== UI ФУНКЦИИ ==========
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            const textEl = document.getElementById('toastText');
            if (!toast || !textEl) return;
            
            textEl.textContent = message;
            toast.className = `floating-message ${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
            
            const closeBtn = document.getElementById('toastClose');
            if (closeBtn) closeBtn.onclick = () => toast.style.display = 'none';
        }
        
        function addMessage(text, sender = 'bot', audioUrl = null) {
            const container = document.getElementById('screenContainer');
            if (!container) return;
            
            if (container.querySelector('.loading-screen')) {
                container.innerHTML = '';
            }
            
            let messagesContainer = container.querySelector('.chat-messages');
            if (!messagesContainer) {
                messagesContainer = document.createElement('div');
                messagesContainer.className = 'chat-messages';
                container.appendChild(messagesContainer);
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            // Форматируем текст для бота
            if (sender === 'bot') {
                messageDiv.innerHTML = formatMessageText(text);
            } else {
                const textSpan = document.createElement('div');
                textSpan.textContent = text;
                messageDiv.appendChild(textSpan);
            }
            
            if (audioUrl) {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = audioUrl;
                messageDiv.appendChild(audio);
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            chatMessages.push({ text, sender, audioUrl, timestamp: new Date() });
        }
        
        function playAudioResponse(audioUrl) {
            if (!audioUrl) return;
            const audio = document.getElementById('hiddenAudioPlayer');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
                audio.src = audioUrl;
                audio.play().catch(e => console.warn('Audio error:', e));
            }
        }
        
        // ========== ГОЛОСОВАЯ ЗАПИСЬ ==========
        
        async function startRecording() {
            if (isRecording) {
                stopRecording();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    if (audioBlob.size > 5000) {
                        addMessage('🎙️ Распознаю речь...', 'system');
                        
                        const result = await sendVoiceToServer(audioBlob);
                        
                        if (result.success) {
                            if (result.recognized_text) {
                                addMessage(`🎤 "${result.recognized_text}"`, 'system');
                            }
                            if (result.answer) {
                                addMessage(result.answer, 'bot');
                                if (result.audio_url) {
                                    playAudioResponse(result.audio_url);
                                }
                            }
                        } else {
                            addMessage(`❌ ${result.error || 'Не удалось распознать речь'}`, 'system');
                        }
                    } else {
                        addMessage('Запись слишком короткая', 'system');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                    
                    const voiceBtn = document.getElementById('mainVoiceBtn');
                    if (voiceBtn) {
                        voiceBtn.classList.remove('recording');
                        voiceBtn.querySelector('.voice-icon').textContent = '🎤';
                    }
                    
                    const statusDiv = document.getElementById('voiceStatusIndicator');
                    if (statusDiv) statusDiv.style.display = 'none';
                    
                    const timerDiv = document.getElementById('recordingTimerGlobal');
                    if (timerDiv) timerDiv.style.display = 'none';
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                recordingSeconds = 0;
                
                const voiceBtn = document.getElementById('mainVoiceBtn');
                if (voiceBtn) {
                    voiceBtn.classList.add('recording');
                    voiceBtn.querySelector('.voice-icon').textContent = '⏹️';
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'block';
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const timerEl = document.getElementById('recordingTimerGlobal');
                    if (timerEl) timerEl.textContent = `${recordingSeconds}s`;
                    if (recordingSeconds >= 60) stopRecording();
                }, 1000);
                
            } catch (error) {
                console.error('Recording error:', error);
                showToast('❌ Не удалось получить доступ к микрофону', 'error');
            }
        }
        
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            mediaRecorder.stop();
            isRecording = false;
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
        }
        
        // ========== ОТРИСОВКА ДАШБОРДА ==========
        
        function updateModeUI() {
            const config = MODES[currentMode];

        async function switchMode(mode) {
            if (mode === currentMode) return;
            
            currentMode = mode;
            console.log('🔄 Смена режима на:', mode);
            
            const config = MODES[mode];
            showToast(`Режим "${config.name}" активирован`, 'success');
            
            await saveMode(mode);
            updateModeUI();
            renderDashboard();
        }
        
        function renderDashboard() {
            const container = document.getElementById('screenContainer');

            const modeConfig = MODES[currentMode];
            const modules = MODULES[currentMode];

                        <div class="profile-badge">

                            <div style="font-size: 10px; color: var(--text-secondary);">ваш психотип</div>
                        </div>
                    </div>
                    
                    <div class="mode-selector">
                        <button class="mode-btn ${currentMode === 'coach' ? 'active coach' : ''}" data-mode="coach">
                            🔮 КОУЧ
                        </button>
                        <button class="mode-btn ${currentMode === 'psychologist' ? 'active psychologist' : ''}" data-mode="psychologist">
                            🧠 ПСИХОЛОГ
                        </button>
                        <button class="mode-btn ${currentMode === 'trainer' ? 'active trainer' : ''}" data-mode="trainer">
                            ⚡ ТРЕНЕР
                        </button>
                    </div>
                    
                    <div class="voice-main">
                        <div class="voice-card-premium">

                                🎙️ Нажмите и говорите (до 60 сек)

                            <div id="voiceStatusIndicator" style="display: none;" class="voice-status">
                                <span class="voice-status-dot"></span>
                                <span>Запись...</span>
                                <span id="voiceTimer">0s</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modules-grid">
                        ${modules.map(module => `
                            <div class="module-card" data-module="${module.id}">
                                <div class="module-icon">${module.icon}</div>
                                <div class="module-name">${module.name}</div>
                                <div class="module-desc">${module.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="quick-actions">
                        <div class="quick-actions-title">⚡ БЫСТРЫЕ ДЕЙСТВИЯ</div>
                        <div class="quick-actions-grid">
                            <div class="quick-action" data-action="profile">
                                <div class="action-icon">🧠</div>
                                <div class="action-name">Мой портрет</div>
                            </div>
                            <div class="quick-action" data-action="thoughts">
                                <div class="action-icon">💭</div>
                                <div class="action-name">Мысли психолога</div>
                            </div>
                            <div class="quick-action" data-action="newThought">
                                <div class="action-icon">✨</div>
                                <div class="action-name">Свежая мысль</div>
                            </div>
                            <div class="quick-action" data-action="weekend">
                                <div class="action-icon">🎨</div>
                                <div class="action-name">Идеи на выходные</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            attachEvents();
            
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (voiceBtn) {
                voiceBtn.addEventListener('click', () => startRecording());
            }
        }
        
        async function handleQuickAction(actionType) {
            const modeConfig = MODES[currentMode];
            
            switch(actionType) {
                case 'profile':
                    showToast('🧠 Загружаю ваш психологический портрет...', 'info');
                    const profile = await getProfile();
                    if (profile && profile.ai_generated_profile) {
                        addMessage(profile.ai_generated_profile, 'bot');
                        const tts = await textToSpeech(profile.ai_generated_profile, currentMode);
                        if (tts?.audio_url) playAudioResponse(tts.audio_url);
                    } else {
                        addMessage('Ваш психологический портрет будет доступен после прохождения теста.', 'bot');
                    }
                    break;
                case 'thoughts':
                    showToast('💭 Загружаю мысли психолога...', 'info');
                    const thought = await getPsychologistThought();
                    if (thought && !thought.includes('еще не сгенерированы')) {
                        addMessage(thought, 'bot');
                        const tts = await textToSpeech(thought, currentMode);
                        if (tts?.audio_url) playAudioResponse(tts.audio_url);
                    } else {
                        addMessage(modeConfig.greeting, 'bot');
                    }
                    break;
                case 'newThought':
                    showToast('✨ Генерирую свежую мысль...', 'info');
                    const newThought = await generateNewThought();
                    if (newThought) {
                        addMessage(newThought, 'bot');
                        const tts = await textToSpeech(newThought, currentMode);
                        if (tts?.audio_url) playAudioResponse(tts.audio_url);
                    } else {
                        showToast('Не удалось сгенерировать мысль', 'warning');
                    }
                    break;
                case 'weekend':
                    showToast('🎨 Ищу идеи для выходных...', 'info');
                    const ideas = await getWeekendIdeas();
                    if (ideas && ideas.length > 0) {
                        const ideasText = ideas.map(idea => idea.description || idea).join('\n\n');
                        addMessage(ideasText, 'bot');
                    } else {
                        addMessage('Идеи для выходных скоро появятся. Расскажите о ваших интересах, чтобы я мог подобрать что-то особенное.', 'bot');
                    }
                    break;
            }
        }
        
        function attachEvents() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    if (mode) switchMode(mode);
                });
            });
            
            document.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const moduleName = card.querySelector('.module-name')?.textContent || 'модуль';
                    showToast(`Модуль "${moduleName}" — в разработке`, 'info');
                });
            });
            
            document.querySelectorAll('.quick-action').forEach(action => {
                action.addEventListener('click', () => {
                    const actionType = action.dataset.action;
                    handleQuickAction(actionType);
                });
            });
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const chatsPanel = document.getElementById('chatsPanel');
            if (menuBtn && chatsPanel) {
                menuBtn.addEventListener('click', () => {
                    chatsPanel.classList.toggle('open');
                });
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            console.log('🚀 FREDI PREMIUM — инициализация...');
            
            try {
                const status = await getUserStatus();
                if (status.profile_code) {
                    const profileCodeEl = document.getElementById('profileCode');
                    if (profileCodeEl) profileCodeEl.textContent = status.profile_code;
                }
            } catch (error) {
                console.warn('API недоступен, работаем в офлайн-режиме');
            }
            
            renderDashboard();
            initMobileMenu();
            
            const userNameEl = document.getElementById('userName');
            if (userNameEl) userNameEl.textContent = CONFIG.USER_NAME;
            
            const userAvatarEl = document.getElementById('userMiniAvatar');
            if (userAvatarEl) userAvatarEl.textContent = CONFIG.USER_NAME.charAt(0);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
