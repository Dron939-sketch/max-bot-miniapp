<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Фреди | Премиум виртуальный психолог</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black-obsidian: #0a0a0a;
            --black-matte: #111111;
            --carbon-fiber: #1a1a1a;
            --glass-dark: rgba(10, 10, 10, 0.85);
            
            --chrome: #e0e0e0;
            --silver-metallic: #c0c0c0;
            --silver-brushed: #b0b0b0;
            --platinum: #a0a0a0;
            
            --amg-red: #ff3b3b;
            --amg-orange: #ff6b3b;
            --amg-blue: #3b82ff;
            --amber: #ffb83b;
            
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --glow-iphone: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 255, 255, 0.3);
            
            --text-primary: #ffffff;
            --text-secondary: #a0a3b0;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black-obsidian);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(224, 224, 224, 0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(255, 59, 59, 0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(224, 224, 224, 0.008) 0px, rgba(224, 224, 224, 0.008) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Левая панель */
        .chats-panel {
            width: 280px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(224, 224, 224, 0.15);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: left 0.3s ease;
            z-index: 20;
            position: relative;
        }

        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                width: 260px;
            }
            
            .chats-panel.open {
                left: 0;
                box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
            }
        }

        .chats-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
        }

        .chats-title {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chats-search {
            padding: 12px 16px;
        }

        .chats-search input {
            width: 100%;
            padding: 10px 16px;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 12px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(224, 224, 224, 0.08);
            border-color: rgba(224, 224, 224, 0.2);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.1), rgba(192, 192, 192, 0.05));
            border-color: rgba(224, 224, 224, 0.3);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--black-obsidian);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-time {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .chats-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 16px;
            background: rgba(224, 224, 224, 0.05);
            cursor: pointer;
        }

        .user-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--black-obsidian);
        }

        .user-mini-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-mini-status {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Правая панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(224, 224, 224, 0.1);
            border: none;
            font-size: 22px;
            color: var(--chrome);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
        }

        .chat-header-status {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulseMode 2s infinite;
        }

        @keyframes pulseMode {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Анимация появления контента */
        .full-content-page {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(26, 26, 26, 0.85));
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            animation: contentAppear 0.3s ease-out;
        }

        @keyframes contentAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            background: rgba(224, 224, 224, 0.1);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 40px;
            padding: 10px 20px;
            color: var(--chrome);
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .content-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.2);
        }

        .content-emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .content-title {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .content-body {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 12px;
        }

        /* Стили для форматированного текста */
        .section-header {
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid var(--chrome);
            padding-left: 14px;
        }

        .section-emoji {
            font-size: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .styled-list {
            margin: 12px 0;
            padding-left: 20px;
            list-style: none;
        }

        .styled-list li {
            margin: 10px 0;
            position: relative;
            padding-left: 22px;
        }

        .styled-list li::before {
            content: '▹';
            position: absolute;
            left: 0;
            color: var(--chrome);
            font-size: 14px;
        }

        .content-body p {
            margin: 12px 0;
            line-height: 1.6;
        }

        .content-body strong {
            color: var(--chrome);
            font-weight: 600;
        }

        .speak-content-btn {
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            color: var(--black-obsidian);
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.2s;
            font-size: 14px;
        }

        .speak-content-btn:active {
            transform: scale(0.98);
        }

        /* Селектор режимов с подсветкой */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.2), rgba(192, 192, 192, 0.1));
            color: var(--text-primary);
            animation: iphoneGlow 2s infinite;
        }

        @keyframes iphoneGlow {
            0% { box-shadow: 0 0 0 0 rgba(224, 224, 224, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(224, 224, 224, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(224, 224, 224, 0); }
        }

        /* Голосовая кнопка с удержанием */
        .voice-section {
            margin-bottom: 32px;
        }

        .voice-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7), rgba(26, 26, 26, 0.6));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .voice-record-btn-premium {
            width: 100%;
            padding: 20px 24px;
            border-radius: 54px;
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.1), rgba(192, 192, 192, 0.05));
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: 500;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .voice-record-btn-premium:active {
            transform: scale(0.98);
        }

        .voice-record-btn-premium .voice-icon {
            font-size: 32px;
            transition: transform 0.1s;
        }

        .voice-record-btn-premium.recording {
            background: linear-gradient(135deg, rgba(255, 59, 59, 0.25), rgba(239, 68, 68, 0.15));
            border-color: var(--amg-red);
            animation: pulseRed 1s infinite;
        }

        .voice-record-btn-premium.recording .voice-icon {
            transform: scale(1.1);
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.3); }
            50% { box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); }
        }

        .voice-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Модули */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .module-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(224, 224, 224, 0.1);
            text-align: center;
        }

        .module-card:active {
            transform: scale(0.98);
        }

        .module-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .module-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .module-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Быстрые действия */
        .quick-actions {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .quick-action {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-action:active {
            transform: scale(0.96);
        }

        .action-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .action-name {
            font-size: 11px;
            font-weight: 500;
        }

        /* Сообщения чата */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            animation: fadeIn 0.2s ease;
            font-size: 14px;
        }

        .message.user {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.15), rgba(192, 192, 192, 0.08));
            align-self: flex-end;
            border-radius: 20px 20px 6px 20px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .message.bot {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7), rgba(26, 26, 26, 0.5));
            backdrop-filter: blur(10px);
            align-self: flex-start;
            border-radius: 20px 20px 20px 6px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .message.system {
            background: rgba(224, 224, 224, 0.05);
            align-self: center;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 90%;
        }

        .message audio {
            margin-top: 8px;
            width: 100%;
            height: 32px;
            border-radius: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.05), rgba(192, 192, 192, 0.02));
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .user-greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .greeting-text h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .greeting-text p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .profile-badge {
            background: rgba(224, 224, 224, 0.08);
            border-radius: 30px;
            padding: 6px 16px;
            text-align: center;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .profile-code {
            font-family: monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Всплывающие сообщения */
        .floating-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.2s ease;
        }

        .floating-message-content {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .floating-message.success .floating-message-content {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9));
        }

        .floating-message.error .floating-message-content {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
        }

        .floating-message-text {
            font-size: 13px;
        }

        .floating-message-close {
            cursor: pointer;
            opacity: 0.7;
            font-size: 16px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .recording-timer-global {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .voice-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            padding: 10px;
            background: rgba(10, 10, 10, 0.7);
            border-radius: 40px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--amg-red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
        }

        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ========== НОВЫЕ СТИЛИ ДЛЯ КОНФАЙНТМЕНТ-МОДЕЛИ ========== */
        
        .confinement-model-page {
            padding: 20px;
        }

        .confinement-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .confinement-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {

        // ========== API ВЫЗОВЫ ==========
        
        async function apiCall(endpoint, options = {}) {
            const url = endpoint.startsWith('http') ? endpoint : `${CONFIG.API_BASE_URL}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            try {
                const response = await fetch(url, { ...options, headers });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                return data;
            } catch (error) {
                console.error(`API Error: ${endpoint}`, error);
                throw error;
            }
        }

            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            const headerEmojis = '🔑💪🎯🌱⚠️🔐🔄🚪📊🧠💭💕🕊️✨🏆👥🎨';

            formatted = formatted.replace(headerRegex, 
                '<div class="section-header"><span class="section-emoji">$1</span><strong class="section-title">$2</strong></div>');
            
            formatted = formatted.replace(/•\s*(.*?)(?=\n|$)/g, '<li>$1</li>');
            formatted = formatted.replace(/(\d+)\.\s*(.*?)(?=\n|$)/g, '<li class="numbered">$1. $2</li>');
            
            const paragraphs = formatted.split('\n\n');
            formatted = paragraphs.map(p => {
                if (p.trim().startsWith('<li>')) return `<ul class="styled-list">${p}</ul>`;
                if (p.trim().startsWith('<li class="numbered">')) return `<ol class="styled-list numbered-list">${p}</ol>`;
                if (p.trim().startsWith('<div class="section-header')) return p;
                if (p.trim().startsWith('<strong>') || p.trim().startsWith('<p>')) return p;
                return `<p>${p}</p>`;
            }).join('');
            
            return formatted;
        }

        // ========== ГОЛОСОВАЯ ЗАПИСЬ С УДЕРЖАНИЕМ ==========
        
        async function startRecordingWithHold() {
            if (isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    if (audioBlob.size > 5000) {
                        addMessage('🎙️ Распознаю речь...', 'system');
                        vibrate(20);
                        
                        const result = await sendVoiceToServer(audioBlob);
                        
                        if (result.success) {
                            vibrate(30);
                            if (result.recognized_text) {
                                addMessage(`🎤 "${result.recognized_text}"`, 'system');
                            }
                            if (result.answer) {
                                addMessage(result.answer, 'bot');
                                if (result.audio_url) {
                                    playAudioResponse(result.audio_url);
                                }
                            }
                        } else {
                            vibrate(100);
                            addMessage(`❌ ${result.error || 'Не удалось распознать речь'}`, 'system');
                        }
                    } else {
                        addMessage('Запись слишком короткая', 'system');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                    
                    const voiceBtn = document.getElementById('mainVoiceBtn');
                    if (voiceBtn) {
                        voiceBtn.classList.remove('recording');
                        voiceBtn.querySelector('.voice-icon').textContent = '🎤';
                        voiceBtn.querySelector('.voice-text').textContent = MODES[currentMode].voicePrompt;
                    }
                    
                    const statusDiv = document.getElementById('voiceStatusIndicator');
                    if (statusDiv) statusDiv.style.display = 'none';
                    
                    const timerDiv = document.getElementById('recordingTimerGlobal');
                    if (timerDiv) timerDiv.style.display = 'none';
                    
                    isRecording = false;
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                recordingSeconds = 0;
                
                const voiceBtn = document.getElementById('mainVoiceBtn');
                if (voiceBtn) {
                    voiceBtn.classList.add('recording');
                    voiceBtn.querySelector('.voice-icon').textContent = '⏹️';
                    voiceBtn.querySelector('.voice-text').textContent = 'Отпустите для отправки';
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'block';
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const timerEl = document.getElementById('recordingTimerGlobal');
                    const voiceTimer = document.getElementById('voiceTimer');
                    if (timerEl) timerEl.textContent = `${recordingSeconds}s`;
                    if (voiceTimer) voiceTimer.textContent = `${recordingSeconds}s`;
                    if (recordingSeconds >= 60) {
                        stopRecordingWithCancel();
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Recording error:', error);
                showToast('❌ Не удалось получить доступ к микрофону', 'error');
                vibrate(100);
            }
        }
        
        function stopRecordingWithSend() {
            if (!isRecording || !mediaRecorder) return;
            mediaRecorder.stop();
        }
        
        function stopRecordingWithCancel() {
            if (!isRecording || !mediaRecorder) return;
            
            mediaRecorder.onstop = null;
            mediaRecorder.stop();
            isRecording = false;
            audioChunks = [];
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
            
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (voiceBtn) {
                voiceBtn.classList.remove('recording');
                voiceBtn.querySelector('.voice-icon').textContent = '🎤';
                voiceBtn.querySelector('.voice-text').textContent = MODES[currentMode].voicePrompt;
            }

            if (statusDiv) statusDiv.style.display = 'none';
            
            const timerDiv = document.getElementById('recordingTimerGlobal');
            if (timerDiv) timerDiv.style.display = 'none';
            
            addMessage('Запись отменена', 'system');
        }
        
        function initVoiceButtonWithHold() {
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (!voiceBtn) return;
            
            if (voiceBtn.dataset.initialized === 'true') return;
            voiceBtn.dataset.initialized = 'true';
            
            let pressTimer = null;
            let isPressing = false;
            let startY = 0;
            let startX = 0;
            
            const onStart = (e) => {
                e.preventDefault();
                if (e.type === 'touchstart') {
                    startY = e.touches[0].clientY;
                    startX = e.touches[0].clientX;
                }
                if (isPressing) return;
                isPressing = true;
                
                pressTimer = setTimeout(() => {
                    if (isPressing) {
                        startRecordingWithHold();
                    }
                }, 150);
            };
            
            const onEnd = (e) => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (isPressing && isRecording) {
                    stopRecordingWithSend();
                }
                isPressing = false;
            };
            
            const onCancel = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (isRecording) {
                    stopRecordingWithCancel();
                }
                isPressing = false;
            };
            
            const checkSwipe = (e) => {
                if (!isPressing) return;
                let currentY, currentX;
                if (e.type === 'touchmove') {
                    currentY = e.touches[0].clientY;
                    currentX = e.touches[0].clientX;
                } else {
                    currentY = e.clientY;
                    currentX = e.clientX;
                }
                const deltaY = Math.abs(currentY - startY);
                const deltaX = Math.abs(currentX - startX);
                if (deltaY > 50 || deltaX > 50) {
                    onCancel();
                }
            };
            
            voiceBtn.addEventListener('mousedown', onStart);
            voiceBtn.addEventListener('mouseup', onEnd);
            voiceBtn.addEventListener('mouseleave', onCancel);
            voiceBtn.addEventListener('touchstart', onStart, { passive: false });
            voiceBtn.addEventListener('touchend', onEnd, { passive: false });
            voiceBtn.addEventListener('touchcancel', onCancel, { passive: false });
            voiceBtn.addEventListener('touchmove', checkSwipe, { passive: false });
        }

                                    <div class="goal-meta">${goal.time || '3-6 месяцев'} • ${goal.difficulty || 'medium'}</div>
                                </div>
                                <button class="select-goal-btn">Выбрать</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="back-btn" id="backBtn" style="margin-top: 20px;">◀️ НАЗАД</button>
                </div>
            `;
            
            document.querySelectorAll('.goal-select-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('select-goal-btn')) {
                        const goal = JSON.parse(item.dataset.goal);
                        buildRouteWithConfinementUI(goal);
                    }
                });
            });
            
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
        }
        
        // ========== ОБРАБОТЧИКИ БЫСТРЫХ ДЕЙСТВИЙ ==========
        
        async function handleShowProfile() {
            showToast('Загружаю ваш психологический портрет...', 'info');
            const profile = await getUserProfile();
            showFullContent('Психологический портрет', profile, 'profile', profile);
        }
        
        async function handleShowThoughts() {
            showToast('Загружаю мысли психолога...', 'info');
            const thought = await getPsychologistThought();
            if (thought && !thought.includes('еще не сгенерированы')) {
                showFullContent('Мысли психолога', thought, 'thoughts', thought);
            } else {
                showToast('Мысли психолога появятся после прохождения теста', 'info');
            }
        }
        
        async function handleShowNewThought() {
            showToast('Генерирую свежую мысль...', 'info');
            const newThought = await generateNewThought();
            if (newThought) {
                showFullContent('Свежая мысль', newThought, 'thoughts', newThought);
            } else {
                showToast('Мысль не удалось сгенерировать', 'error');
            }
        }
        
        async function handleShowWeekend() {
            showToast('Ищу идеи для выходных...', 'info');
            const ideas = await getWeekendIdeas();
            if (ideas.length > 0) {
                const ideasText = ideas.map(idea => idea.description || idea).join('\n\n');
                showFullContent('Идеи на выходные', ideasText, 'weekend', ideasText);
            } else {
                showToast('Идеи скоро появятся', 'info');
            }
        }
        
        async function handleShowGoals() {
            showToast('Подбираю цели...', 'info');
            const goals = await getUserGoals();
            if (goals.length > 0) {
                const goalsText = goals.map(g => `**${g.name}**\n⏱ ${g.time || '?'}  |  🎯 ${g.difficulty || 'medium'}\n${g.is_priority ? '🔐 Приоритетная цель (ключевое ограничение)' : ''}`).join('\n\n');
                showFullContent('Ваши цели', goalsText, 'goals', goalsText);
            } else {
                showToast('Цели появятся после прохождения теста', 'info');
            }
        }
        
        async function handleShowQuestions() {
            showToast('Генерирую вопросы...', 'info');
            const questions = await getSmartQuestions();
            if (questions.length > 0) {
                const questionsText = questions.map((q, i) => `${i+1}. ${q}`).join('\n\n');
                showFullContent('Вопросы для размышления', questionsText, 'questions', questionsText);
            } else {
                showToast('Вопросы появятся после прохождения теста', 'info');
            }
        }
        
        async function handleShowChallenges() {
            showToast('Загружаю челленджи...', 'info');
            const challenges = await getChallenges();
            if (challenges.length > 0) {
                const challengesText = challenges.map(c => `**${c.name}**\n${c.description}\n🎁 Награда: ${c.reward} очков`).join('\n\n');
                showFullContent('Челленджи', challengesText, 'challenges', challengesText);
            } else {
                showToast('Челленджи появятся после прохождения теста', 'info');
            }
        }
        
        async function handleShowDoubles() {
            showToast('Ищу ваших психометрических двойников...', 'info');
            const doubles = await findPsychometricDoubles();
            if (doubles.length > 0) {
                const doublesText = doubles.map(d => `**${d.name}**\nПрофиль: ${d.profile_code}\nСхожесть: ${Math.round(d.similarity * 100)}%`).join('\n\n');
                showFullContent('Психометрические двойники', doublesText, 'doubles', doublesText);
            } else {
                showToast('Двойники появятся после прохождения теста', 'info');
            }
        }
        
        // ========== ОТРИСОВКА ДАШБОРДА ==========
        
        function updateModeUI() {
            const config = MODES[currentMode];
            const modeLabel = document.getElementById('modeLabel');
            const modeIndicator = document.getElementById('modeIndicator');
            
            if (modeLabel) modeLabel.textContent = config.name;
            if (modeIndicator) modeIndicator.style.background = config.color;
        }
        
        async function switchMode(mode) {
            if (mode === currentMode) return;
            
            currentMode = mode;
            console.log('🔄 Смена режима на:', mode);
            
            const config = MODES[mode];
            showToast(`Режим "${config.name}" активирован`, 'success');
            vibrate(20);
            
            await saveMode(mode);
            updateModeUI();
            renderDashboard();
        }
        
        function renderDashboard() {
            const container = document.getElementById('screenContainer');
            if (!container) return;
            
            const modeConfig = MODES[currentMode];
            const modules = MODULES[currentMode];
            
            container.innerHTML = `
                <div class="dashboard-container">
                    <div class="hero-section">
                        <div class="user-greeting">
                            <div class="greeting-text">
                                <h2>${modeConfig.emoji} ${modeConfig.greeting}</h2>
                                <p>${CONFIG.USER_NAME}, я здесь, чтобы помочь</p>
                            </div>
                            <div class="profile-badge">
                                <div class="profile-code" id="profileCode">${CONFIG.PROFILE_CODE}</div>
                                <div style="font-size: 10px; color: var(--text-secondary);">ваш психотип</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mode-selector">
                        <button class="mode-btn ${currentMode === 'coach' ? 'active coach' : ''}" data-mode="coach">
                            🔮 КОУЧ
                        </button>
                        <button class="mode-btn ${currentMode === 'psychologist' ? 'active psychologist' : ''}" data-mode="psychologist">
                            🧠 ПСИХОЛОГ
                        </button>
                        <button class="mode-btn ${currentMode === 'trainer' ? 'active trainer' : ''}" data-mode="trainer">
                            ⚡ ТРЕНЕР
                        </button>
                    </div>
                    
                    <div class="voice-section">
                        <div class="voice-card">
                            <button class="voice-record-btn-premium" id="mainVoiceBtn">
                                <span class="voice-icon">🎤</span>
                                <span class="voice-text">${modeConfig.voicePrompt}</span>
                            </button>
                            <div class="voice-hint">
                                🎙️ Нажмите и удерживайте для записи (до 60 сек)<br>
                                Свайп вверх/вбок — отмена
                            </div>
                            <div id="voiceStatusIndicator" style="display: none;" class="voice-status">
                                <span class="voice-status-dot"></span>
                                <span>Запись...</span>
                                <span id="voiceTimer">0s</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modules-grid">
                        ${modules.map(module => `
                            <div class="module-card" data-module="${module.id}">
                                <div class="module-icon">${module.icon}</div>
                                <div class="module-name">${module.name}</div>
                                <div class="module-desc">${module.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="quick-actions">
                        <div class="quick-actions-title">Быстрые действия</div>
                        <div class="quick-actions-grid">
                            <div class="quick-action" data-action="profile">
                                <div class="action-icon">🧠</div>
                                <div class="action-name">Мой портрет</div>
                            </div>
                            <div class="quick-action" data-action="thoughts">
                                <div class="action-icon">💭</div>
                                <div class="action-name">Мысли психолога</div>
                            </div>
                            <div class="quick-action" data-action="newThought">
                                <div class="action-icon">✨</div>
                                <div class="action-name">Свежая мысль</div>
                            </div>
                            <div class="quick-action" data-action="weekend">
                                <div class="action-icon">🎨</div>
                                <div class="action-name">Идеи на выходные</div>
                            </div>
                            <div class="quick-action" data-action="goals">
                                <div class="action-icon">🎯</div>
                                <div class="action-name">Цели</div>
                            </div>
                            <div class="quick-action" data-action="questions">
                                <div class="action-icon">❓</div>
                                <div class="action-name">Вопросы</div>
                            </div>
                            <div class="quick-action" data-action="challenges">
                                <div class="action-icon">🏆</div>
                                <div class="action-name">Челленджи</div>
                            </div>
                            <div class="quick-action" data-action="doubles">
                                <div class="action-icon">👥</div>
                                <div class="action-name">Двойники</div>
                            </div>
                            <div class="quick-action" data-action="confinement">
                                <div class="action-icon">🔐</div>
                                <div class="action-name">Модель ограничений</div>
                            </div>
                            <div class="quick-action" data-action="realityCheck">
                                <div class="action-icon">🔍</div>
                                <div class="action-name">Проверка реальности</div>
                            </div>
                            <div class="quick-action" data-action="buildRoute">
                                <div class="action-icon">🗺️</div>
                                <div class="action-name">Построить маршрут</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            attachEvents();
            initVoiceButtonWithHold();
        }
        
        function attachEvents() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    if (mode) switchMode(mode);
                });
            });
            
            document.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const moduleName = card.querySelector('.module-name')?.textContent || 'модуль';
                    showToast(`Модуль "${moduleName}" — скоро будет доступен`, 'info');
                });
            });
            
            document.querySelectorAll('.quick-action').forEach(action => {
                action.addEventListener('click', async () => {
                    const actionType = action.dataset.action;
                    switch(actionType) {
                        case 'profile': await handleShowProfile(); break;
                        case 'thoughts': await handleShowThoughts(); break;
                        case 'newThought': await handleShowNewThought(); break;
                        case 'weekend': await handleShowWeekend(); break;
                        case 'goals': await handleShowGoals(); break;
                        case 'questions': await handleShowQuestions(); break;
                        case 'challenges': await handleShowChallenges(); break;
                        case 'doubles': await handleShowDoubles(); break;
                        case 'confinement': await showConfinementModel(); break;
                        case 'realityCheck': await showRealityCheckWithConfinement(); break;
                        case 'buildRoute': await showGoalSelectionForRoute(); break;
                    }
                });
            });
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const chatsPanel = document.getElementById('chatsPanel');
            if (menuBtn && chatsPanel) {
                menuBtn.addEventListener('click', () => {
                    chatsPanel.classList.toggle('open');
                });
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            console.log('🚀 FREDI PREMIUM — инициализация...');
            console.log('👤 USER_ID:', CONFIG.USER_ID);
            console.log('🌐 API_URL:', CONFIG.API_BASE_URL);
            
            try {
                const status = await getUserStatus();
                if (status.profile_code) {
                    const profileCodeEl = document.getElementById('profileCode');
                    if (profileCodeEl) profileCodeEl.textContent = status.profile_code;
                }
            } catch (error) {
                console.warn('API недоступен, работаем в офлайн-режиме');
            }
            
            renderDashboard();
            initMobileMenu();
            
            const userNameEl = document.getElementById('userName');
            if (userNameEl) userNameEl.textContent = CONFIG.USER_NAME;
            
            const userAvatarEl = document.getElementById('userMiniAvatar');
            if (userAvatarEl) userAvatarEl.textContent = CONFIG.USER_NAME.charAt(0);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
