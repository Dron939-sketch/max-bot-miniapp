        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(103, 110, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            animation: bgMove 25s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate(-2%, -2%) scale(1.05); opacity: 1; }
        }

        /* Noise Texture */

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            z-index: -1;

        .app {

            position: relative;
        }

            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;

        .chats-header {
            padding: 28px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .chats-title {

            font-weight: 800;

            background-clip: text;
            color: transparent;

            height: 44px;

            cursor: pointer;
            transition: all 0.3s;
            color: white;

        .chat-item {

        .chats-footer {

        .user-mini-profile {

        .user-mini-status {
            font-size: 11px;

        /* Main Chat Panel */
        .chat-panel {
            flex: 1;

        }

        .chat-header {

        .chat-header-avatar {

        }

            background: rgba(255, 255, 255, 0.05);

        }

        .profile-code {

        }

        .stat-card {

        }

        .stat-info span {

        }

        .voice-section {

        .voice-record-btn-premium {
            width: 100%;
            padding: 24px 32px;

            padding: 6px;
            border: 1px solid var(--glass-border);
        }

        .mode-btn {

            border-radius: 50px;

            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .mode-btn.psychologist.active { background: var(--gradient-psychologist); }
        .mode-btn.trainer.active { background: var(--gradient-trainer); }

        /* Modules Grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .module-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);

            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);

            font-size: 44px;
            margin-bottom: 16px;
        }

        .module-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .module-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Quick Actions */
        .quick-actions {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--glass-border);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .quick-action {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;

        .quick-action:hover {

            border-color: var(--glass-border);

            font-size: 28px;

            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .floating-message-content {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--glass-border);
        }

        .floating-message.success .floating-message-content {
            background: var(--success);
        }

        .floating-message.error .floating-message-content {
            background: var(--error);
        }

        .floating-message-text {
            font-size: 14px;
        }

        .floating-message-close {
            cursor: pointer;
            opacity: 0.7;
            font-size: 18px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Recording Timer */
        .recording-timer-global {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            border: 1px solid var(--glass-border);

            gap: 12px;
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
        }

        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Loading Screen */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .loading-spinner {
            font-size: 56px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -320px;
                width: 280px;
                z-index: 100;
                height: 100%;
            }
            
            .chats-panel.open {
                left: 0;
            }
            
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .screen-container {
                padding: 20px 16px;
            }
            
            .hero-section {
                padding: 20px;
            }
            
            .greeting-text h2 {
                font-size: 22px;
            }
            
            .modules-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            
            .quick-actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .mode-btn span:first-child {
                display: none;
            }
            
            .mode-btn {
                padding: 12px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 10px;
        }
    </style>
</head>

                    <div class="loading-text">Загрузка личного кабинета...</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="hiddenAudioPlayer" preload="auto"></audio>
    <div id="recordingTimerGlobal" class="recording-timer-global" style="display: none;">0s</div>
    <div id="toastMessage" class="floating-message" style="display: none;">
        <div class="floating-message-content">
            <div class="floating-message-text" id="toastText"></div>
            <div class="floating-message-close" id="toastClose">✕</div>
        </div>
    </div>

    <script>
        // ============================================
        // MAIN APPLICATION
        // ============================================
        
        class FrediApp {
            constructor() {
                this.userId = 213102077;
                this.userName = 'Андрей';
                this.currentMode = 'psychologist'; // coach, psychologist, trainer
                this.isRecording = false;
                this.recordingTimer = null;
                this.recordingSeconds = 0;
                this.voiceObserver = null;
                
                this.modeConfig = {
                    coach: {
                        name: 'КОУЧ',
                        icon: '🔮',
                        gradient: 'linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%)',
                        color: '#3b82f6',
                        greeting: 'Привет! Я твой коуч. Давай найдём ответы внутри тебя.',
                        voicePrompt: 'Задай вопрос, я помогу найти решение',
                        indicatorColor: '#3b82f6'
                    },
                    psychologist: {
                        name: 'ПСИХОЛОГ',
                        icon: '🧠',
                        gradient: 'linear-gradient(135deg, #ec489a 0%, #8b5cf6 100%)',
                        color: '#ec489a',
                        greeting: 'Здравствуйте. Я здесь, чтобы помочь разобраться в глубинных паттернах.',
                        voicePrompt: 'Расскажите, что вас беспокоит',
                        indicatorColor: '#ec489a'
                    },
                    trainer: {
                        name: 'ТРЕНЕР',
                        icon: '⚡',
                        gradient: 'linear-gradient(135deg, #f59e0b 0%, #ef4444 100%)',
                        color: '#f59e0b',
                        greeting: 'Готов к работе! Давай достигать целей вместе!',
                        voicePrompt: 'Сформулируй задачу, получишь чёткий план',
                        indicatorColor: '#f59e0b'
                    }
                };
                
                this.modules = {
                    coach: [
                        { id: 'goals', name: 'Цели', icon: '🎯', desc: 'Постановка и достижение' },
                        { id: 'strategy', name: 'Стратегия', icon: '📊', desc: 'План действий' },
                        { id: 'motivation', name: 'Мотивация', icon: '⚡', desc: 'Энергия для движения' },
                        { id: 'habits', name: 'Привычки', icon: '🔄', desc: 'Новые паттерны' }
                    ],
                    psychologist: [
                        { id: 'analysis', name: 'Анализ', icon: '🧠', desc: 'Глубинные паттерны' },
                        { id: 'emotions', name: 'Эмоции', icon: '💭', desc: 'Работа с чувствами' },
                        { id: 'trauma', name: 'Исцеление', icon: '🕊️', desc: 'Проработка опыта' },
                        { id: 'relations', name: 'Отношения', icon: '💕', desc: 'Коммуникация' }
                    ],
                    trainer: [
                        { id: 'workout', name: 'Тренировки', icon: '💪', desc: 'Физическая активность' },
                        { id: 'discipline', name: 'Дисциплина', icon: '⏰', desc: 'Режим и порядок' },
                        { id: 'results', name: 'Результаты', icon: '🏆', desc: 'Достижения' },
                        { id: 'challenges', name: 'Челленджи', icon: '🔥', desc: 'Испытания' }
                    ]
                };
                
                this.init();
            }
            
            init() {
                console.log('🎯 FrediApp инициализирован, режим:', this.currentMode);
                this.renderDashboard();
                this.initVoiceButton();
                this.initMobileMenu();
                
                // Обновляем статус
                this.updateModeUI();
            }
            
            updateModeUI() {
                const config = this.modeConfig[this.currentMode];
                const statusSpan = document.getElementById('modeLabel');
                const indicator = document.getElementById('modeIndicator');
                const botStatus = document.getElementById('botStatus');
                
                if (statusSpan) statusSpan.textContent = config.name;
                if (indicator) indicator.style.background = config.indicatorColor;
                if (botStatus) {
                    botStatus.style.borderLeft = `3px solid ${config.indicatorColor}`;
                    botStatus.style.paddingLeft = '10px';
                }
            }
            
            renderDashboard() {
                const container = document.getElementById('screenContainer');
                if (!container) return;
                
                const config = this.modeConfig[this.currentMode];
                const modulesList = this.modules[this.currentMode];
                
                container.innerHTML = `
                    <div class="dashboard-container">
                        <!-- Hero Section -->
                        <div class="hero-section">
                            <div class="user-greeting">
                                <div class="greeting-text">
                                    <h2>${config.icon} ${config.greeting}</h2>
                                    <p>${this.userName}, я здесь, чтобы помочь</p>
                                </div>
                                <div class="profile-badge">
                                    <div class="profile-code">СБ-4_ТФ-4_УБ-4_ЧВ-4</div>
                                    <div style="font-size: 10px; color: var(--text-secondary);">ваш психотип</div>
                                </div>
                            </div>
                            <div class="stats-row">
                                <div class="stat-card">
                                    <div class="stat-icon">📅</div>
                                    <div class="stat-info">
                                        <h4>3</h4>
                                        <span>дня с вами</span>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon">💬</div>
                                    <div class="stat-info">
                                        <h4>12</h4>
                                        <span>сессий</span>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon">🎯</div>
                                    <div class="stat-info">
                                        <h4>85%</h4>
                                        <span>прогресс</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Mode Selector -->
                        <div class="mode-selector">
                            <button class="mode-btn ${this.currentMode === 'coach' ? 'active coach' : ''}" data-mode="coach">
                                🔮 КОУЧ
                            </button>
                            <button class="mode-btn ${this.currentMode === 'psychologist' ? 'active psychologist' : ''}" data-mode="psychologist">
                                🧠 ПСИХОЛОГ
                            </button>
                            <button class="mode-btn ${this.currentMode === 'trainer' ? 'active trainer' : ''}" data-mode="trainer">
                                ⚡ ТРЕНЕР
                            </button>
                        </div>
                        
                        <!-- Voice Section -->
                        <div class="voice-section">
                            <div class="voice-card">
                                <button class="voice-record-btn-premium" id="mainVoiceBtn">
                                    <span class="voice-icon">🎤</span>
                                    <span class="voice-text">${config.voicePrompt}</span>
                                </button>
                                <div class="voice-hint">
                                    🎙️ Нажмите и удерживайте для записи (до 60 сек) • Свайп вверх/вбок для отмены
                                </div>
                                <div id="voiceStatusIndicator" style="display: none;" class="voice-status">
                                    <span class="voice-status-dot"></span>
                                    <span>🎙️ Запись...</span>
                                    <span id="voiceTimer">0s</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Modules Grid -->
                        <div class="modules-grid">
                            ${modulesList.map(module => `
                                <div class="module-card" data-module="${module.id}">
                                    <div class="module-icon">${module.icon}</div>
                                    <div class="module-name">${module.name}</div>
                                    <div class="module-desc">${module.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <!-- Quick Actions -->
                        <div class="quick-actions">
                            <div class="quick-actions-title">⚡ Быстрые действия</div>
                            <div class="quick-actions-grid">
                                <div class="quick-action" data-action="profile">
                                    <div class="action-icon">🧠</div>
                                    <div class="action-name">Мой портрет</div>
                                </div>
                                <div class="quick-action" data-action="thoughts">
                                    <div class="action-icon">💭</div>
                                    <div class="action-name">Мысли психолога</div>
                                </div>
                                <div class="quick-action" data-action="progress">
                                    <div class="action-icon">📈</div>
                                    <div class="action-name">Мой прогресс</div>
                                </div>
                                <div class="quick-action" data-action="advice">
                                    <div class="action-icon">✨</div>
                                    <div class="action-name">Совет дня</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                this.attachEvents();
                this.initVoiceButton(); // Re-init voice button after render
            }
            
            attachEvents() {
                // Mode buttons
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const mode = btn.dataset.mode;
                        if (mode && mode !== this.currentMode) {
                            this.switchMode(mode);
                        }
                    });
                });
                
                // Module cards
                document.querySelectorAll('.module-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const moduleName = card.querySelector('.module-name')?.textContent || 'модуль';
                        this.showToast(`📖 Модуль "${moduleName}" — скоро будет доступен`, 'info');
                    });
                });
                
                // Quick actions
                document.querySelectorAll('.quick-action').forEach(action => {
                    action.addEventListener('click', () => {
                        const actionType = action.dataset.action;
                        this.handleQuickAction(actionType);
                    });
                });
            }
            
            switchMode(mode) {
                this.currentMode = mode;
                console.log('🔄 Смена режима на:', mode);
                
                const config = this.modeConfig[mode];
                this.showToast(`🔄 Режим "${config.name}" активирован`, 'success');
                
                // Обновляем UI
                this.updateModeUI();
                this.renderDashboard();
            }
            
            handleQuickAction(actionType) {
                const config = this.modeConfig[this.currentMode];
                const messages = {
                    profile: '🧠 Ваш психологический портрет формируется. Пройдите тест для детального анализа.',
                    thoughts: `💭 ${config.greeting} Что бы вы хотели обсудить сегодня?`,
                    progress: '📊 Ваш прогресс: 3 дня активной работы, 12 сессий. Продолжайте в том же духе!',
                    advice: `✨ ${config.voicePrompt} Я готов вас выслушать.`
                };
                
                this.showToast(messages[actionType] || 'Функция скоро будет доступна', 'info');
            }
            
            initVoiceButton() {
                // Clean up previous observer
                if (this.voiceObserver) {
                    this.voiceObserver.disconnect();
                }
                
                const waitForButton = () => {
                    const btn = document.getElementById('mainVoiceBtn');
                    if (btn) {
                        this.setupVoiceButton(btn);
                        return true;
                    }
                    return false;
                };
                
                if (waitForButton()) return;
                
                this.voiceObserver = new MutationObserver(() => {
                    if (waitForButton()) {
                        this.voiceObserver.disconnect();
                        this.voiceObserver = null;
                    }
                });
                
                this.voiceObserver.observe(document.body, { childList: true, subtree: true });
                
                setTimeout(() => {
                    if (this.voiceObserver) {
                        this.voiceObserver.disconnect();
                        this.voiceObserver = null;
                    }
                }, 3000);
            }
            
            setupVoiceButton(btn) {
                if (btn.dataset.initialized === 'true') return;
                btn.dataset.initialized = 'true';
                
                console.log('🎤 Инициализация микрофона для режима:', this.currentMode);
                
                let pressTimer = null;
                let isPressing = false;
                let startY = 0;
                
                const onStart = (e) => {
                    e.preventDefault();
                    if (e.type === 'touchstart') {
                        startY = e.touches[0].clientY;
                    }
                    if (isPressing) return;
                    isPressing = true;
                    btn.style.transform = 'scale(0.98)';
                    
                    pressTimer = setTimeout(() => {
                        if (isPressing) {
                            btn.style.transform = '';
                            this.startRecording();
                        }
                    }, 150);
                };
                
                const onEnd = (e) => {
                    if (pressTimer) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                    if (isPressing && this.isRecording) {
                        this.stopRecording();
                    }
                    isPressing = false;
                    btn.style.transform = '';
                };
                
                const onCancel = () => {
                    if (pressTimer) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                    if (this.isRecording) {
                        this.cancelRecording();
                    }
                    isPressing = false;
                    btn.style.transform = '';
                };
                
                const checkSwipe = (e) => {
                    if (!isPressing || !e.touches) return;
                    const currentY = e.touches[0].clientY;
                    if (startY - currentY > 50) {
                        onCancel();
                    }
                };
                
                btn.addEventListener('mousedown', onStart);
                btn.addEventListener('mouseup', onEnd);
                btn.addEventListener('mouseleave', onCancel);
                btn.addEventListener('touchstart', onStart, { passive: false });
                btn.addEventListener('touchend', onEnd, { passive: false });
                btn.addEventListener('touchcancel', onCancel, { passive: false });
                btn.addEventListener('touchmove', checkSwipe, { passive: false });
            }
            
            startRecording() {
                console.log('🎤 Начало записи в режиме:', this.currentMode);
                this.isRecording = true;
                this.recordingSeconds = 0;
                
                const btn = document.getElementById('mainVoiceBtn');
                if (btn) {
                    btn.classList.add('recording');
                    const config = this.modeConfig[this.currentMode];
                    btn.querySelector('.voice-text').textContent = `🎙️ Запись... ${config.voicePrompt}`;
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'block';
                
                this.recordingTimer = setInterval(() => {
                    this.recordingSeconds++;
                    const timerEl = document.getElementById('recordingTimerGlobal');
                    const voiceTimer = document.getElementById('voiceTimer');
                    if (timerEl) timerEl.textContent = `${this.recordingSeconds}s`;
                    if (voiceTimer) voiceTimer.textContent = `${this.recordingSeconds}s`;
                    
                    if (this.recordingSeconds >= 60) {
                        this.stopRecording();
                    }
                }, 1000);
            }
            
            stopRecording() {
                console.log('🎤 Остановка записи');
                this.isRecording = false;
                
                if (this.recordingTimer) {
                    clearInterval(this.recordingTimer);
                    this.recordingTimer = null;
                }
                
                const btn = document.getElementById('mainVoiceBtn');
                if (btn) {
                    btn.classList.remove('recording');
                    const config = this.modeConfig[this.currentMode];
                    btn.querySelector('.voice-text').textContent = config.voicePrompt;
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'none';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'none';
                
                // Отправляем сообщение в зависимости от режима
                const mode = this.currentMode;
                const modeMessages = {
                    coach: '🔮 Как коуч, я слышу ваш запрос. Давайте вместе найдём решение.',
                    psychologist: '🧠 Я внимательно слушаю. Расскажите подробнее, что вас беспокоит.',
                    trainer: '⚡ Отлично! Запрос принят. Вот конкретные шаги к цели.'
                };
                
                this.showToast(modeMessages[mode] || '🎤 Голосовое сообщение получено!', 'success');
            }
            
            cancelRecording() {
                console.log('🎤 Запись отменена');
                this.isRecording = false;
                
                if (this.recordingTimer) {
                    clearInterval(this.recordingTimer);
                    this.recordingTimer = null;
                }
                
                const btn = document.getElementById('mainVoiceBtn');
                if (btn) {
                    btn.classList.remove('recording');
                    const config = this.modeConfig[this.currentMode];
                    btn.querySelector('.voice-text').textContent = config.voicePrompt;
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'none';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'none';
                
                this.showToast('Запись отменена', 'info');
            }
            
            showToast(message, type = 'info') {
                const toast = document.getElementById('toastMessage');
                const textEl = document.getElementById('toastText');
                if (!toast || !textEl) return;
                
                textEl.textContent = message;
                toast.className = `floating-message ${type}`;
                toast.style.display = 'block';
                
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 3500);
                
                const closeBtn = document.getElementById('toastClose');
                if (closeBtn) closeBtn.onclick = () => toast.style.display = 'none';
            }
            
            initMobileMenu() {
                const menuBtn = document.getElementById('mobileMenuBtn');
                const chatsPanel = document.getElementById('chatsPanel');
                if (menuBtn && chatsPanel) {
                    menuBtn.addEventListener('click', () => {
                        chatsPanel.classList.toggle('open');
                    });
                }
            }
        }
        
        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 DOM загружен, запуск приложения');
            window.app = new FrediApp();
        });
    </script>
</body>
</html>
