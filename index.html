<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Фреди | Премиум виртуальный психолог</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black-obsidian: #0a0a0a;
            --black-matte: #111111;
            --carbon-fiber: #1a1a1a;
            --glass-dark: rgba(10, 10, 10, 0.85);
            
            --chrome: #e0e0e0;
            --silver-metallic: #c0c0c0;
            --silver-brushed: #b0b0b0;
            --platinum: #a0a0a0;
            
            --amg-red: #ff3b3b;
            --amg-orange: #ff6b3b;
            --amg-blue: #3b82ff;
            --amber: #ffb83b;
            
            --glass-gradient: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(26, 26, 26, 0.85) 100%);
            --chrome-gradient: linear-gradient(135deg, #e0e0e0 0%, #b0b0b0 50%, #e0e0e0 100%);
            
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glass: 0 0 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --shadow-chrome: 0 5px 15px rgba(192, 192, 192, 0.2);
            
            --text-primary: #ffffff;
            --text-secondary: #a0a3b0;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black-obsidian);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(224, 224, 224, 0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(255, 59, 59, 0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(224, 224, 224, 0.008) 0px, rgba(224, 224, 224, 0.008) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .chats-panel {
            width: 320px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(224, 224, 224, 0.15);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }

        .chats-header {
            padding: 28px 20px 20px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
            position: relative;
        }

        .chats-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .chats-title {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome) 0%, var(--silver-brushed) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .chats-search {
            padding: 16px 20px;
        }

        .chats-search input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(224, 224, 224, 0.03);
            border: 1px solid rgba(224, 224, 224, 0.15);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .chats-search input:focus {
            outline: none;
            border-color: var(--chrome);
            box-shadow: 0 0 15px rgba(224, 224, 224, 0.1);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            gap: 14px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(224, 224, 224, 0.05);
            border-color: rgba(224, 224, 224, 0.2);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.08), rgba(192, 192, 192, 0.03));
            border-color: rgba(224, 224, 224, 0.3);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
            box-shadow: 0 0 15px rgba(224, 224, 224, 0.2);
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--black-obsidian);
            box-shadow: 0 0 5px rgba(16, 185, 129, 0.5);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chats-footer {
            padding: 20px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
            position: relative;
        }

        .chats-footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 20px;
            background: rgba(224, 224, 224, 0.03);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .user-mini-profile:hover {
            background: rgba(224, 224, 224, 0.08);
            border-color: rgba(224, 224, 224, 0.2);
        }

        .user-mini-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--black-obsidian);
        }

        .user-mini-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-mini-status {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
            position: relative;
        }

        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid rgba(224, 224, 224, 0.2);
            font-size: 24px;
            color: var(--chrome);
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .mobile-menu-btn:hover {
            background: rgba(224, 224, 224, 0.1);
            transform: scale(1.02);
        }

        .chat-header-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px rgba(224, 224, 224, 0.2);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(224, 224, 224, 0.2); }
            50% { box-shadow: 0 0 25px rgba(224, 224, 224, 0.4); }
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.3px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulseMode 2s infinite;
        }

        @keyframes pulseMode {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        .screen-container::-webkit-scrollbar,
        .chats-list::-webkit-scrollbar {
            width: 4px;
        }

        .screen-container::-webkit-scrollbar-track,
        .chats-list::-webkit-scrollbar-track {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 4px;
        }

        .screen-container::-webkit-scrollbar-thumb,
        .chats-list::-webkit-scrollbar-thumb {
            background: var(--chrome);
            border-radius: 4px;
        }

        .dashboard-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.05), rgba(192, 192, 192, 0.02));
            border-radius: 32px;
            padding: 32px 36px;
            margin-bottom: 32px;
            border: 1px solid rgba(224, 224, 224, 0.15);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
        }

        .user-greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .greeting-text h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .greeting-text p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .profile-badge {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 40px;
            padding: 10px 24px;
            text-align: center;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .profile-code {
            font-family: monospace;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Голосовая кнопка */
        .voice-section {
            margin-bottom: 40px;
        }

        .voice-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7), rgba(26, 26, 26, 0.6));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            box-shadow: var(--shadow-premium);
        }

        .voice-record-btn-premium {
            width: 100%;
            padding: 28px 32px;
            border-radius: 52px;
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.08), rgba(192, 192, 192, 0.03));
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 18px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .voice-record-btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(224, 224, 224, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .voice-record-btn-premium:hover::before {
            left: 100%;
        }

        .voice-record-btn-premium .voice-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 10px rgba(224, 224, 224, 0.5));
        }

        .voice-record-btn-premium:hover {
            transform: scale(1.01);
            border-color: rgba(224, 224, 224, 0.4);
        }

        .voice-record-btn-premium.recording {
            background: linear-gradient(135deg, rgba(255, 59, 59, 0.2), rgba(239, 68, 68, 0.1));
            border-color: var(--amg-red);
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.3); }
            50% { box-shadow: 0 0 0 20px rgba(255, 59, 59, 0); }
        }

        .voice-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* Селектор режимов */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .mode-btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
            position: relative;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.15), rgba(192, 192, 192, 0.05));
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(224, 224, 224, 0.1);
        }

        .mode-btn.coach.active { border-color: var(--amg-blue); box-shadow: 0 0 15px rgba(59, 130, 255, 0.2); }
        .mode-btn.psychologist.active { border-color: var(--amg-orange); box-shadow: 0 0 15px rgba(255, 107, 59, 0.2); }
        .mode-btn.trainer.active { border-color: var(--amg-red); box-shadow: 0 0 15px rgba(255, 59, 59, 0.2); }

        /* Модули */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .module-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(224, 224, 224, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--chrome), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .module-card:hover::before {
            transform: translateX(100%);
        }

        .module-card:hover {
            transform: translateY(-6px);
            border-color: rgba(224, 224, 224, 0.3);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .module-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .module-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .module-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Быстрые действия */
        .quick-actions {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 24px;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        .quick-action {
            background: rgba(224, 224, 224, 0.03);
            border-radius: 24px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-action:hover {
            background: rgba(224, 224, 224, 0.08);
            border-color: rgba(224, 224, 224, 0.3);
            transform: translateY(-3px);
        }

        .action-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .action-name {
            font-size: 13px;
            font-weight: 500;
        }

        /* Сообщения чата */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 24px;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .message.user {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.12), rgba(192, 192, 192, 0.06));
            align-self: flex-end;
            border-radius: 24px 24px 6px 24px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .message.bot {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.6), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(10px);
            align-self: flex-start;
            border-radius: 24px 24px 24px 6px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .message.system {
            background: rgba(224, 224, 224, 0.03);
            align-self: center;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 90%;
        }

        .message audio {
            margin-top: 12px;
            width: 100%;
            height: 36px;
            border-radius: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .floating-message-content {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .floating-message.success .floating-message-content {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9));
        }

        .floating-message.error .floating-message-content {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
        }

        .floating-message-text {
            font-size: 14px;
        }

        .floating-message-close {
            cursor: pointer;
            opacity: 0.7;
            font-size: 18px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .recording-timer-global {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            border: 1px solid rgba(224, 224, 224, 0.2);
            letter-spacing: 2px;
        }

        .voice-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            padding: 14px;
            background: rgba(10, 10, 10, 0.6);
            border-radius: 40px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--amg-red);
            animation: blink 1s infinite;
            box-shadow: 0 0 5px var(--amg-red);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .loading-spinner {
            font-size: 64px;
            animation: spin 1s linear infinite;

</head>
<body>

    <audio id="hiddenAudioPlayer" preload="auto"></audio>

            <div class="floating-message-text" id="toastText"></div>

    </div>

    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        
        const CONFIG = {
            API_BASE_URL: 'https://max-bot-1-ywpz.onrender.com',
            USER_ID: 213102077,
            USER_NAME: 'Андрей',
            PROFILE_CODE: 'СБ-4_ТФ-4_УБ-4_ЧВ-4'
        };
        
        // Режимы
        const MODES = {
            coach: {
                id: 'coach',
                name: 'КОУЧ',
                emoji: '🔮',
                color: '#3b82ff',
                greeting: 'Приветствую. Я твой коуч. Давай найдём ответы внутри тебя.',
                voicePrompt: 'Задай вопрос — я помогу найти решение'
            },
            psychologist: {
                id: 'psychologist',
                name: 'ПСИХОЛОГ',
                emoji: '🧠',
                color: '#ff6b3b',
                greeting: 'Здравствуйте. Я здесь, чтобы помочь разобраться в глубинных паттернах.',
                voicePrompt: 'Расскажите, что вас беспокоит'
            },
            trainer: {
                id: 'trainer',
                name: 'ТРЕНЕР',
                emoji: '⚡',
                color: '#ff3b3b',
                greeting: 'Готов к работе. Давай достигать целей вместе!',
                voicePrompt: 'Сформулируй задачу — получишь чёткий план'
            }
        };
        
        // Модули для каждого режима
        const MODULES = {
            coach: [
                { id: 'goals', name: 'Цели', icon: '🎯', desc: 'Постановка и достижение' },
                { id: 'strategy', name: 'Стратегия', icon: '📊', desc: 'План действий' },
                { id: 'motivation', name: 'Мотивация', icon: '⚡', desc: 'Энергия для движения' },
                { id: 'habits', name: 'Привычки', icon: '🔄', desc: 'Формирование привычек' }
            ],
            psychologist: [
                { id: 'analysis', name: 'Анализ', icon: '🧠', desc: 'Глубинные паттерны' },
                { id: 'emotions', name: 'Эмоции', icon: '💭', desc: 'Работа с чувствами' },
                { id: 'trauma', name: 'Исцеление', icon: '🕊️', desc: 'Проработка опыта' },
                { id: 'relations', name: 'Отношения', icon: '💕', desc: 'Коммуникация' }
            ],
            trainer: [
                { id: 'workout', name: 'Тренировки', icon: '💪', desc: 'Физическая активность' },
                { id: 'discipline', name: 'Дисциплина', icon: '⏰', desc: 'Режим и порядок' },
                { id: 'results', name: 'Результаты', icon: '🏆', desc: 'Достижения' },
                { id: 'challenges', name: 'Челленджи', icon: '🔥', desc: 'Испытания' }
            ]
        };
        
        // Состояние
        let currentMode = 'psychologist';
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let mediaRecorder = null;
        let audioChunks = [];
        let chatMessages = [];
        
        // ========== API ВЫЗОВЫ ==========
        
        async function apiCall(endpoint, options = {}) {
            const url = endpoint.startsWith('http') ? endpoint : `${CONFIG.API_BASE_URL}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            try {
                const response = await fetch(url, { ...options, headers });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                return data;
            } catch (error) {
                console.error(`API Error: ${endpoint}`, error);
                throw error;
            }
        }
        
        async function saveMode(mode) {
            try {
                await apiCall('/api/save-mode', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: CONFIG.USER_ID, mode })
                });
                console.log('✅ Режим сохранён:', mode);
            } catch (error) {
                console.warn('Не удалось сохранить режим', error);
            }
        }
        
        async function sendVoiceToServer(audioBlob) {
            const formData = new FormData();
            formData.append('user_id', CONFIG.USER_ID);
            formData.append('voice', audioBlob, 'voice.webm');
            
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/voice/process`, {
                    method: 'POST',
                    body: formData
                });
                return await response.json();
            } catch (error) {
                console.error('Send voice error:', error);
                return { success: false, error: 'Ошибка отправки голоса' };
            }
        }
        
        async function textToSpeech(text, mode) {
            try {
                const response = await apiCall('/api/tts', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode })
                });
                return response;
            } catch (error) {
                console.error('TTS error:', error);
                return null;
            }
        }
        
        async function getUserStatus() {
            try {
                return await apiCall(`/api/user-status?user_id=${CONFIG.USER_ID}`);
            } catch (error) {
                console.warn('Failed to get user status', error);
                return { has_profile: true, test_completed: true, profile_code: CONFIG.PROFILE_CODE };
            }
        }
        
        async function getPsychologistThought() {
            try {
                const data = await apiCall(`/api/thought?user_id=${CONFIG.USER_ID}`);
                return data.thought;
            } catch (error) {
                console.warn('Failed to get thought', error);
                return null;
            }
        }
        
        async function getWeekendIdeas() {
            try {
                const data = await apiCall(`/api/ideas?user_id=${CONFIG.USER_ID}`);
                return data.ideas || [];
            } catch (error) {
                console.warn('Failed to get ideas', error);
                return [];
            }
        }
        
        async function generateNewThought() {
            try {
                const data = await apiCall('/api/psychologist-thoughts/generate', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: CONFIG.USER_ID })
                });
                return data.thought;
            } catch (error) {
                console.warn('Failed to generate thought', error);
                return null;
            }
        }
        
        // ========== НОВЫЕ API ИНТЕГРАЦИИ ==========
        
        async function getUserProfile() {
            try {
                const data = await apiCall(`/api/get-profile?user_id=${CONFIG.USER_ID}`);
                return data.ai_generated_profile || 'Психологический портрет формируется. Пройдите тест для детального анализа.';
            } catch (error) {
                console.warn('Failed to get profile', error);
                return 'Профиль временно недоступен.';
            }
        }
        
        async function getUserGoals() {
            try {
                const data = await apiCall(`/api/goals?user_id=${CONFIG.USER_ID}&mode=${currentMode}`);
                return data.goals || [];
            } catch (error) {
                console.warn('Failed to get goals', error);
                return [];
            }
        }
        
        async function getSmartQuestions() {
            try {
                const data = await apiCall(`/api/smart-questions?user_id=${CONFIG.USER_ID}`);
                return data.questions || [];
            } catch (error) {
                console.warn('Failed to get smart questions', error);
                return [];
            }
        }
        
        async function getChallenges() {
            try {
                const data = await apiCall(`/api/challenges?user_id=${CONFIG.USER_ID}`);
                return data.challenges || [];
            } catch (error) {
                console.warn('Failed to get challenges', error);
                return [];
            }
        }
        
        async function findPsychometricDoubles() {
            try {
                const data = await apiCall(`/api/psychometric/find-doubles?user_id=${CONFIG.USER_ID}&limit=5`);
                return data.doubles || [];
            } catch (error) {
                console.warn('Failed to find doubles', error);
                return [];
            }
        }
        
        // ========== UI ФУНКЦИИ ==========
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            const textEl = document.getElementById('toastText');
            if (!toast || !textEl) return;
            
            textEl.textContent = message;
            toast.className = `floating-message ${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
            
            const closeBtn = document.getElementById('toastClose');
            if (closeBtn) closeBtn.onclick = () => toast.style.display = 'none';
        }
        
        function addMessage(text, sender = 'bot', audioUrl = null) {
            const container = document.getElementById('screenContainer');
            if (!container) return;
            
            if (container.querySelector('.loading-screen')) {
                container.innerHTML = '';
            }
            
            let messagesContainer = container.querySelector('.chat-messages');
            if (!messagesContainer) {
                messagesContainer = document.createElement('div');
                messagesContainer.className = 'chat-messages';
                container.appendChild(messagesContainer);
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const textSpan = document.createElement('div');
            textSpan.textContent = text;
            messageDiv.appendChild(textSpan);
            
            if (audioUrl) {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = audioUrl;
                messageDiv.appendChild(audio);
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            chatMessages.push({ text, sender, audioUrl, timestamp: new Date() });
        }
        
        function playAudioResponse(audioUrl) {
            if (!audioUrl) return;
            const audio = document.getElementById('hiddenAudioPlayer');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
                audio.src = audioUrl;
                audio.play().catch(e => console.warn('Audio error:', e));
            }
        }
        
        // ========== ГОЛОСОВАЯ ЗАПИСЬ ==========
        
        async function startRecording() {
            if (isRecording) {
                stopRecording();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    if (audioBlob.size > 5000) {
                        addMessage('🎙️ Распознаю речь...', 'system');
                        
                        const result = await sendVoiceToServer(audioBlob);
                        
                        if (result.success) {
                            if (result.recognized_text) {
                                addMessage(`🎤 "${result.recognized_text}"`, 'system');
                            }
                            if (result.answer) {
                                addMessage(result.answer, 'bot');
                                if (result.audio_url) {
                                    playAudioResponse(result.audio_url);
                                }
                            }
                        } else {
                            addMessage(`❌ ${result.error || 'Не удалось распознать речь'}`, 'system');
                        }
                    } else {
                        addMessage('Запись слишком короткая', 'system');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                    
                    const voiceBtn = document.getElementById('mainVoiceBtn');
                    if (voiceBtn) {
                        voiceBtn.classList.remove('recording');
                        voiceBtn.querySelector('.voice-icon').textContent = '🎤';
                    }
                    
                    const statusDiv = document.getElementById('voiceStatusIndicator');
                    if (statusDiv) statusDiv.style.display = 'none';
                    
                    const timerDiv = document.getElementById('recordingTimerGlobal');
                    if (timerDiv) timerDiv.style.display = 'none';
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                recordingSeconds = 0;
                
                const voiceBtn = document.getElementById('mainVoiceBtn');
                if (voiceBtn) {
                    voiceBtn.classList.add('recording');
                    voiceBtn.querySelector('.voice-icon').textContent = '⏹️';
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'block';
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const timerEl = document.getElementById('recordingTimerGlobal');
                    const voiceTimer = document.getElementById('voiceTimer');
                    if (timerEl) timerEl.textContent = `${recordingSeconds}s`;
                    if (voiceTimer) voiceTimer.textContent = `${recordingSeconds}s`;
                    if (recordingSeconds >= 60) stopRecording();
                }, 1000);
                
            } catch (error) {
                console.error('Recording error:', error);
                showToast('❌ Не удалось получить доступ к микрофону', 'error');
            }
        }
        
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            mediaRecorder.stop();
            isRecording = false;
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
        }
        
        // ========== НОВЫЕ ОБРАБОТЧИКИ ==========
        
        async function handleShowProfile() {
            showToast('Загружаю ваш психологический портрет...', 'info');
            const profile = await getUserProfile();
            addMessage(profile, 'bot');
            const tts = await textToSpeech(profile, currentMode);
            if (tts?.audio_url) playAudioResponse(tts.audio_url);
        }
        
        async function handleShowGoals() {
            showToast('Подбираю цели для вашего профиля...', 'info');
            const goals = await getUserGoals();
            if (goals.length > 0) {
                const goalsText = `🎯 Ваши цели (режим ${MODES[currentMode].name}):\n\n` + 
                    goals.map(g => `• ${g.name}\n  ⏱ ${g.time}  |  🎯 ${g.difficulty}`).join('\n\n');
                addMessage(goalsText, 'bot');
                const tts = await textToSpeech(goalsText.replace(/[^\w\s,.]/g, ''), currentMode);
                if (tts?.audio_url) playAudioResponse(tts.audio_url);
            } else {
                addMessage('Цели будут подобраны после прохождения теста.', 'bot');
            }
        }
        
        async function handleShowSmartQuestions() {
            showToast('Генерирую вопросы для размышления...', 'info');
            const questions = await getSmartQuestions();
            if (questions.length > 0) {
                const questionsText = `❓ Вопросы для размышления:\n\n` + 
                    questions.map((q, i) => `${i+1}. ${q}`).join('\n');
                addMessage(questionsText, 'bot');
                const tts = await textToSpeech(questionsText.replace(/[^\w\s,.]/g, ''), currentMode);
                if (tts?.audio_url) playAudioResponse(tts.audio_url);
            } else {
                addMessage('Вопросы появятся после прохождения теста.', 'bot');
            }
        }
        
        async function handleShowChallenges() {
            showToast('Загружаю челленджи...', 'info');
            const challenges = await getChallenges();
            if (challenges.length > 0) {
                const challengesText = `🏆 Челленджи для развития:\n\n` + 
                    challenges.map(c => `• ${c.name}\n  ${c.description}\n  🎁 Награда: ${c.reward} очков`).join('\n\n');
                addMessage(challengesText, 'bot');
                const tts = await textToSpeech(challengesText.replace(/[^\w\s,.]/g, ''), currentMode);
                if (tts?.audio_url) playAudioResponse(tts.audio_url);
            } else {
                addMessage('Челленджи будут доступны после прохождения теста.', 'bot');
            }
        }
        
        async function handleShowDoubles() {
            showToast('Ищу ваших психометрических двойников...', 'info');
            const doubles = await findPsychometricDoubles();
            if (doubles.length > 0) {
                const doublesText = `👥 Ваши психометрические двойники:\n\n` + 
                    doubles.map(d => `• ${d.name}\n  Профиль: ${d.profile_code}\n  Схожесть: ${Math.round(d.similarity * 100)}%`).join('\n\n');
                addMessage(doublesText, 'bot');
                const tts = await textToSpeech(doublesText.replace(/[^\w\s,.]/g, ''), currentMode);
                if (tts?.audio_url) playAudioResponse(tts.audio_url);
            } else {
                addMessage('Пока не найдено двойников. Пройдите тест для более точного поиска.', 'bot');
            }
        }
        
        // ========== ОТРИСОВКА ДАШБОРДА ==========
        
        function updateModeUI() {
            const config = MODES[currentMode];
            const modeLabel = document.getElementById('modeLabel');
            const modeIndicator = document.getElementById('modeIndicator');
            
            if (modeLabel) modeLabel.textContent = config.name;
            if (modeIndicator) modeIndicator.style.background = config.color;
        }
        
        async function switchMode(mode) {
            if (mode === currentMode) return;
            
            currentMode = mode;
            console.log('🔄 Смена режима на:', mode);
            
            const config = MODES[mode];
            showToast(`Режим "${config.name}" активирован`, 'success');
            
            await saveMode(mode);
            updateModeUI();
            renderDashboard();
        }
        
        function renderDashboard() {
            const container = document.getElementById('screenContainer');
            if (!container) return;
            
            const modeConfig = MODES[currentMode];
            const modules = MODULES[currentMode];
            
            container.innerHTML = `
                <div class="dashboard-container">
                    <div class="hero-section">
                        <div class="user-greeting">
                            <div class="greeting-text">
                                <h2>${modeConfig.emoji} ${modeConfig.greeting}</h2>
                                <p>${CONFIG.USER_NAME}, я здесь, чтобы помочь</p>
                            </div>
                            <div class="profile-badge">
                                <div class="profile-code" id="profileCode">${CONFIG.PROFILE_CODE}</div>
                                <div style="font-size: 10px; color: var(--text-secondary);">ваш психотип</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mode-selector">
                        <button class="mode-btn ${currentMode === 'coach' ? 'active coach' : ''}" data-mode="coach">
                            🔮 КОУЧ
                        </button>
                        <button class="mode-btn ${currentMode === 'psychologist' ? 'active psychologist' : ''}" data-mode="psychologist">
                            🧠 ПСИХОЛОГ
                        </button>
                        <button class="mode-btn ${currentMode === 'trainer' ? 'active trainer' : ''}" data-mode="trainer">
                            ⚡ ТРЕНЕР
                        </button>
                    </div>
                    
                    <div class="voice-section">
                        <div class="voice-card">
                            <button class="voice-record-btn-premium" id="mainVoiceBtn">
                                <span class="voice-icon">🎤</span>
                                <span class="voice-text">${modeConfig.voicePrompt}</span>
                            </button>
                            <div class="voice-hint">
                                🎙️ Нажмите для записи (до 60 сек)
                            </div>
                            <div id="voiceStatusIndicator" style="display: none;" class="voice-status">
                                <span class="voice-status-dot"></span>
                                <span>Запись...</span>
                                <span id="voiceTimer">0s</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modules-grid">
                        ${modules.map(module => `
                            <div class="module-card" data-module="${module.id}">
                                <div class="module-icon">${module.icon}</div>
                                <div class="module-name">${module.name}</div>
                                <div class="module-desc">${module.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="quick-actions">
                        <div class="quick-actions-title">Быстрые действия</div>
                        <div class="quick-actions-grid">
                            <div class="quick-action" data-action="profile">
                                <div class="action-icon">🧠</div>
                                <div class="action-name">Мой портрет</div>
                            </div>
                            <div class="quick-action" data-action="thoughts">
                                <div class="action-icon">💭</div>
                                <div class="action-name">Мысли психолога</div>
                            </div>
                            <div class="quick-action" data-action="newThought">
                                <div class="action-icon">✨</div>
                                <div class="action-name">Свежая мысль</div>
                            </div>
                            <div class="quick-action" data-action="weekend">
                                <div class="action-icon">🎨</div>
                                <div class="action-name">Идеи на выходные</div>
                            </div>
                            <div class="quick-action" data-action="goals">
                                <div class="action-icon">🎯</div>
                                <div class="action-name">Цели</div>
                            </div>
                            <div class="quick-action" data-action="questions">
                                <div class="action-icon">❓</div>
                                <div class="action-name">Вопросы</div>
                            </div>
                            <div class="quick-action" data-action="challenges">
                                <div class="action-icon">🏆</div>
                                <div class="action-name">Челленджи</div>
                            </div>
                            <div class="quick-action" data-action="doubles">
                                <div class="action-icon">👥</div>
                                <div class="action-name">Двойники</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            attachEvents();
            
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (voiceBtn) {
                voiceBtn.addEventListener('click', () => startRecording());
            }
        }
        
        async function handleQuickAction(actionType) {
            const modeConfig = MODES[currentMode];
            
            switch(actionType) {
                case 'profile':
                    await handleShowProfile();
                    break;
                case 'thoughts':
                    showToast('Загружаю мысли психолога...', 'info');
                    const thought = await getPsychologistThought();
                    if (thought) {
                        addMessage(thought, 'bot');
                        const tts = await textToSpeech(thought, currentMode);
                        if (tts?.audio_url) playAudioResponse(tts.audio_url);
                    } else {
                        showToast(modeConfig.greeting, 'info');
                    }
                    break;
                case 'newThought':
                    showToast('Генерирую свежую мысль...', 'info');
                    const newThought = await generateNewThought();
                    if (newThought) {
                        addMessage(newThought, 'bot');
                        const tts = await textToSpeech(newThought, currentMode);
                        if (tts?.audio_url) playAudioResponse(tts.audio_url);
                    }
                    break;
                case 'weekend':
                    showToast('Ищу идеи для выходных...', 'info');
                    const ideas = await getWeekendIdeas();
                    if (ideas.length > 0) {
                        addMessage(ideas[0].description || ideas[0], 'bot');
                    } else {
                        showToast('Идеи скоро появятся', 'info');
                    }
                    break;
                case 'goals':
                    await handleShowGoals();
                    break;
                case 'questions':
                    await handleShowSmartQuestions();
                    break;
                case 'challenges':
                    await handleShowChallenges();
                    break;
                case 'doubles':
                    await handleShowDoubles();
                    break;
            }
        }
        
        function attachEvents() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    if (mode) switchMode(mode);
                });
            });
            
            document.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const moduleName = card.querySelector('.module-name')?.textContent || 'модуль';
                    showToast(`Модуль "${moduleName}" — скоро будет доступен`, 'info');
                });
            });
            
            document.querySelectorAll('.quick-action').forEach(action => {
                action.addEventListener('click', () => {
                    const actionType = action.dataset.action;
                    handleQuickAction(actionType);
                });
            });
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const chatsPanel = document.getElementById('chatsPanel');
            if (menuBtn && chatsPanel) {
                menuBtn.addEventListener('click', () => {
                    chatsPanel.classList.toggle('open');
                });
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        async function init() {
            console.log('🚀 FREDI PREMIUM — инициализация...');
            console.log('👤 USER_ID:', CONFIG.USER_ID);
            console.log('🌐 API_URL:', CONFIG.API_BASE_URL);
            
            try {
                const status = await getUserStatus();
                if (status.profile_code) {
                    const profileCodeEl = document.getElementById('profileCode');
                    if (profileCodeEl) profileCodeEl.textContent = status.profile_code;
                }
            } catch (error) {
                console.warn('API недоступен, работаем в офлайн-режиме');
            }
            
            renderDashboard();
            initMobileMenu();
            
            const userNameEl = document.getElementById('userName');
            if (userNameEl) userNameEl.textContent = CONFIG.USER_NAME;
            
            const userAvatarEl = document.getElementById('userMiniAvatar');
            if (userAvatarEl) userAvatarEl.textContent = CONFIG.USER_NAME.charAt(0);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
