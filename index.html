<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6366f1">
    <title>Фреди · виртуальный психолог</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #0a0c15;
            --bg-card: rgba(18, 22, 35, 0.85);
            --bg-sidebar: rgba(12, 14, 22, 0.95);
            --gradient-coach: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-psychologist: linear-gradient(135deg, #ec489a 0%, #8b5cf6 100%);
            --gradient-trainer: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            --accent-purple: #8b5cf6;
            --accent-pink: #ec489a;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0a3b0;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            animation: bgMove 25s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate(-2%, -2%) scale(1.05); opacity: 1; }
        }

        .noise-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .chats-panel {
            width: 320px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .chats-header {
            padding: 28px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .chats-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .chats-search {
            padding: 16px 20px;
        }

        .chats-search input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .chats-search input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.08);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            gap: 14px;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chats-footer {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s;
            cursor: pointer;
        }

        .user-mini-profile:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .user-mini-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }

        .user-mini-info {
            flex: 1;
        }

        .user-mini-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-mini-status {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(10, 12, 21, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulseMode 2s infinite;
        }

        @keyframes pulseMode {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        .dashboard-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.1));
            border-radius: 32px;
            padding: 28px 32px;
            margin-bottom: 32px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .user-greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .greeting-text h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .greeting-text p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .profile-badge {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 8px 20px;
            text-align: center;
        }

        .profile-code {
            font-family: monospace;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-row {
            display: flex;
            gap: 32px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 28px;
        }

        .stat-info h4 {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-info span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .voice-section {
            margin-bottom: 40px;
        }

        .voice-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 8px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .voice-record-btn-premium {
            width: 100%;
            padding: 24px 32px;
            border-radius: 40px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.1));
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: all 0.3s;
            font-size: 18px;
            font-weight: 500;
        }

        .voice-record-btn-premium .voice-icon {
            font-size: 32px;
            transition: transform 0.2s;
        }

        .voice-record-btn-premium:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.2));
            transform: scale(1.01);
        }

        .voice-record-btn-premium.recording {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }

        .voice-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid var(--glass-border);
        }

        .mode-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: var(--gradient-coach);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .mode-btn.coach.active { background: var(--gradient-coach); }
        .mode-btn.psychologist.active { background: var(--gradient-psychologist); }
        .mode-btn.trainer.active { background: var(--gradient-trainer); }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .module-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .module-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
        }

        .module-icon {
            font-size: 44px;
            margin-bottom: 16px;
        }

        .module-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .module-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .quick-actions {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--glass-border);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .quick-action {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .quick-action:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-border);
            transform: translateY(-2px);
        }

        .action-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .action-name {
            font-size: 13px;
            font-weight: 500;
        }

        .floating-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .floating-message-content {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--glass-border);
        }

        .floating-message.success .floating-message-content {
            background: var(--success);
        }

        .floating-message.error .floating-message-content {
            background: var(--error);
        }

        .floating-message-text {
            font-size: 14px;
        }

        .floating-message-close {
            cursor: pointer;
            opacity: 0.7;
            font-size: 18px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .recording-timer-global {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            border: 1px solid var(--glass-border);
        }

        .voice-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
        }

        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .loading-spinner {
            font-size: 56px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -320px;
                width: 280px;
                z-index: 100;
                height: 100%;
            }
            
            .chats-panel.open {
                left: 0;
            }
            
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .screen-container {
                padding: 20px 16px;
            }
            
            .hero-section {
                padding: 20px;
            }
            
            .greeting-text h2 {
                font-size: 22px;
            }
            
            .modules-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            
            .quick-actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .mode-btn span:first-child {
                display: none;
            }
            
            .mode-btn {
                padding: 12px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="noise-bg"></div>
    
    <div class="app">
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="chats-title">Фреди</div>
                    <button class="mode-btn" id="newChatBtn" style="width: 40px; height: 40px; padding: 0; background: rgba(255,255,255,0.05);">✎</button>
                </div>
            </div>
            <div class="chats-search">
                <input type="text" placeholder="Поиск" id="chatSearchInput">
            </div>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active" data-chat="fredi">
                    <div class="chat-avatar">🧠</div>
                    <div class="chat-info">
                        <div class="chat-name">Фреди</div>
                        <div class="chat-preview" id="chatPreview">Чем могу помочь?</div>
                    </div>
                    <div class="chat-time">сейчас</div>
                </div>
            </div>
            <div class="chats-footer">
                <div class="user-mini-profile" id="userMiniProfile">
                    <div class="user-mini-avatar" id="userMiniAvatar">А</div>
                    <div class="user-mini-info">
                        <div class="user-mini-name" id="userName">Андрей</div>
                        <div class="user-mini-status" id="userStatus">🧠 активен</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <div class="chat-header-avatar">🧠</div>
                    <div>
                        <div class="chat-header-name">Фреди</div>
                        <div class="chat-header-status" id="botStatus">
                            <span class="mode-indicator" id="modeIndicator" style="background: #8b5cf6;"></span>
                            <span id="modeLabel">Психолог</span>
                        </div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="mode-btn" style="width: 40px; height: 40px; padding: 0;" id="menuBtn">⋮</button>
                </div>
            </div>
            <div id="screenContainer" class="screen-container">
                <div class="loading-screen">
                    <div class="loading-spinner">🧠</div>
                    <div class="loading-text">Загрузка личного кабинета...</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="hiddenAudioPlayer" preload="auto"></audio>
    <div id="recordingTimerGlobal" class="recording-timer-global" style="display: none;">0s</div>
    <div id="toastMessage" class="floating-message" style="display: none;">
        <div class="floating-message-content">
            <div class="floating-message-text" id="toastText"></div>
            <div class="floating-message-close" id="toastClose">✕</div>
        </div>
    </div>

    <!-- Подключаем API класс -->
    <script>
        // ============================================
        // API КЛАСС (встроен для автономности)
        // ============================================
        
        class FrediAPI {
            constructor(baseUrl = null) {
                if (baseUrl) {
                    this.baseUrl = baseUrl;
                } else if (window.API_BASE_URL) {
                    this.baseUrl = window.API_BASE_URL;
                } else {
                    this.baseUrl = '';
                }
                
                this.userId = 213102077;
                this.cache = new Map();
                this.cacheTTL = 5 * 60 * 1000;
                
                console.log('📡 FrediAPI инициализирован');
                console.log('   baseUrl:', this.baseUrl || '(текущий домен)');
            }
            
            setBaseUrl(url) {
                this.baseUrl = url;
                console.log('📡 API baseUrl изменён на:', url || '(текущий домен)');
            }
            
            setUserId(userId) {
                this.userId = userId;
            }
            
            async request(endpoint, options = {}) {
                let url;
                if (this.baseUrl) {
                    url = `${this.baseUrl}${endpoint}`;
                } else {
                    url = endpoint;
                }
                
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };
                
                const config = { ...options, headers };
                
                try {
                    console.log(`📡 API ${options.method || 'GET'} ${url}`);
                    const response = await fetch(url, config);
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || `HTTP ${response.status}`);
                    }
                    
                    return data;
                } catch (error) {
                    console.error(`API Error [${endpoint}]:`, error);
                    throw error;
                }
            }
            
            getCacheKey(endpoint, params) {
                return `${endpoint}:${JSON.stringify(params)}`;
            }
            
            isCacheValid(cached) {
                return cached && (Date.now() - cached.timestamp) < this.cacheTTL;
            }
            
            async getUserStatus(userId) {
                const cacheKey = this.getCacheKey('/user-status', { userId });
                const cached = this.cache.get(cacheKey);
                if (this.isCacheValid(cached)) {
                    return cached.data;
                }
                
                const data = await this.request(`/api/user-status?user_id=${userId}`);
                this.cache.set(cacheKey, { data, timestamp: Date.now() });
                return data;
            }
            
            async getUserProfile(userId) {
                const data = await this.request(`/api/get-profile?user_id=${userId}`);
                return data;
            }
            
            async getPsychologistThought(userId) {
                const data = await this.request(`/api/thought?user_id=${userId}`);
                return data.thought;
            }
            
            async saveCommunicationMode(userId, mode) {
                const data = await this.request('/api/save-mode', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: userId, mode })
                });
                return data;
            }
            
            async getAvailableModes() {
                const data = await this.request('/api/modes');
                return data.modes || [];
            }
            
            async getDynamicGoals(userId, mode = 'coach') {
                const data = await this.request(`/api/goals?user_id=${userId}&mode=${mode}`);
                return data.goals || [];
            }
            
            async getSmartQuestions(userId) {
                const data = await this.request(`/api/smart-questions?user_id=${userId}`);
                return data.questions || [];
            }
            
            async sendVoiceMessage(userId, audioBlob) {
                const formData = new FormData();
                formData.append('user_id', userId);
                formData.append('voice', audioBlob, 'voice.webm');
                
                try {
                    const url = this.baseUrl ? `${this.baseUrl}/api/voice/process` : '/api/voice/process';
                    const response = await fetch(url, { method: 'POST', body: formData });
                    return await response.json();
                } catch (error) {
                    console.error('Voice API Error:', error);
                    throw error;
                }
            }
            
            clearCache() {
                this.cache.clear();
                console.log('🧹 Кэш API очищен');
            }
        }
        
        // Создаём глобальный экземпляр API
        window.api = new FrediAPI();
        window.api.setUserId(213102077);
        console.log('✅ API модуль загружен');
    </script>

            setTimeout(() => {

        function updateModeUI() {

        }
        
        async function switchMode(mode) {

            currentMode = mode;

            const config = CONFIG.MODES[mode];

            }
            
            updateModeUI();
            renderDashboard();
        }
        
        function playAudioResponse(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }
        
        // ============================================
        // ГОЛОСОВАЯ ЗАПИСЬ
        // ============================================
        
        async function startRecording() {
            if (isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    if (audioBlob.size > 5000) {
                        showToast('🎙️ Распознаю речь...', 'info');
                        
                        try {
                            const result = await window.api.sendVoiceMessage(CONFIG.USER_ID, audioBlob);
                            
                            if (result.success) {
                                if (result.recognized_text) {
                                    showToast(`🎤 "${result.recognized_text}"`, 'success');
                                }
                                if (result.answer) {
                                    showToast(result.answer, 'info');
                                    playAudioResponse(result.answer);
                                }
                                if (result.audio_url) {
                                    const audio = document.getElementById('hiddenAudioPlayer');
                                    if (audio) {
                                        audio.src = result.audio_url;
                                        audio.play().catch(e => console.warn('Audio play error:', e));
                                    }
                                }
                            } else {
                                showToast(result.error || 'Не удалось распознать речь', 'error');
                            }
                        } catch (error) {
                            console.error('Send voice error:', error);
                            showToast('❌ Ошибка отправки голоса', 'error');
                        }
                    } else {
                        showToast('Запись слишком короткая', 'error');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                recordingSeconds = 0;
                
                const voiceBtn = document.getElementById('mainVoiceBtn');
                if (voiceBtn) {
                    voiceBtn.classList.add('recording');
                    const config = CONFIG.MODES[currentMode];
                    voiceBtn.querySelector('.voice-text').textContent = '🎙️ Запись... отпустите для отправки';
                }
                
                const statusDiv = document.getElementById('voiceStatusIndicator');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                const timerDiv = document.getElementById('recordingTimerGlobal');
                if (timerDiv) timerDiv.style.display = 'block';
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const timerEl = document.getElementById('recordingTimerGlobal');
                    const voiceTimer = document.getElementById('voiceTimer');
                    if (timerEl) timerEl.textContent = `${recordingSeconds}s`;
                    if (voiceTimer) voiceTimer.textContent = `${recordingSeconds}s`;
                    
                    if (recordingSeconds >= 60) {
                        stopRecording();
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Recording error:', error);
                showToast('❌ Не удалось получить доступ к микрофону', 'error');
            }
        }
        
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            
            mediaRecorder.stop();
            isRecording = false;
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
            
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (voiceBtn) {
                voiceBtn.classList.remove('recording');
                const config = CONFIG.MODES[currentMode];
                voiceBtn.querySelector('.voice-text').textContent = config.voicePrompt;
            }
            
            const statusDiv = document.getElementById('voiceStatusIndicator');
            if (statusDiv) statusDiv.style.display = 'none';
            
            const timerDiv = document.getElementById('recordingTimerGlobal');
            if (timerDiv) timerDiv.style.display = 'none';
        }
        
        function cancelRecording() {
            if (!isRecording || !mediaRecorder) return;
            
            mediaRecorder.onstop = null;
            mediaRecorder.stop();
            isRecording = false;
            audioChunks = [];
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
            
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (voiceBtn) {
                voiceBtn.classList.remove('recording');
                const config = CONFIG.MODES[currentMode];
                voiceBtn.querySelector('.voice-text').textContent = config.voicePrompt;
            }
            
            const statusDiv = document.getElementById('voiceStatusIndicator');
            if (statusDiv) statusDiv.style.display = 'none';
            
            const timerDiv = document.getElementById('recordingTimerGlobal');
            if (timerDiv) timerDiv.style.display = 'none';
            
            showToast('Запись отменена', 'info');
        }
        
        function initVoiceButton() {
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (!voiceBtn) {
                console.warn('Voice button not found');
                return;
            }
            
            if (voiceBtn.dataset.initialized === 'true') return;
            voiceBtn.dataset.initialized = 'true';
            
            console.log('🎤 Инициализация голосовой кнопки для режима:', currentMode);
            
            let pressTimer = null;
            let isPressing = false;
            let startY = 0;
            
            const onStart = (e) => {
                e.preventDefault();
                if (e.type === 'touchstart') {
                    startY = e.touches[0].clientY;
                }
                if (isPressing) return;
                isPressing = true;
                voiceBtn.style.transform = 'scale(0.98)';
                
                pressTimer = setTimeout(() => {
                    if (isPressing) {
                        voiceBtn.style.transform = '';
                        startRecording();
                    }
                }, 150);
            };
            
            const onEnd = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (isPressing && isRecording) {
                    stopRecording();
                }
                isPressing = false;
                voiceBtn.style.transform = '';
            };
            
            const onCancel = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (isRecording) {
                    cancelRecording();
                }
                isPressing = false;
                voiceBtn.style.transform = '';
            };
            
            const checkSwipe = (e) => {
                if (!isPressing || !e.touches) return;
                const currentY = e.touches[0].clientY;
                if (startY - currentY > 50) {
                    onCancel();
                }
            };
            
            voiceBtn.addEventListener('mousedown', onStart);
            voiceBtn.addEventListener('mouseup', onEnd);
            voiceBtn.addEventListener('mouseleave', onCancel);
            voiceBtn.addEventListener('touchstart', onStart, { passive: false });
            voiceBtn.addEventListener('touchend', onEnd, { passive: false });
            voiceBtn.addEventListener('touchcancel', onCancel, { passive: false });
            voiceBtn.addEventListener('touchmove', checkSwipe, { passive: false });
        }

                    </div>
                </div>
            `;
            
            attachEvents();
            initVoiceButton();
            loadProfileData();
        }
        
        function attachEvents() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    if (mode) switchMode(mode);
                });
            });
            
            document.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const moduleName = card.querySelector('.module-name')?.textContent || 'модуль';
                    showToast(`📖 Модуль "${moduleName}" — скоро будет доступен`, 'info');
                });
            });
            
            document.querySelectorAll('.quick-action').forEach(action => {
                action.addEventListener('click', async () => {
                    const actionType = action.dataset.action;
                    await handleQuickAction(actionType);
                });
            });
        }
        
        async function handleQuickAction(actionType) {
            const modeConfig = CONFIG.MODES[currentMode];
            
            switch(actionType) {
                case 'profile':
                    showToast('🧠 Загружаю ваш психологический портрет...', 'info');
                    try {
                        const profile = await window.api.getUserProfile(CONFIG.USER_ID);
                        if (profile && profile.ai_generated_profile) {
                            showToast(profile.ai_generated_profile.substring(0, 200) + '...', 'info');
                        } else {
                            showToast('Пройдите тест, чтобы увидеть полный психологический портрет', 'info');
                        }
                    } catch (error) {
                        showToast('Не удалось загрузить профиль', 'error');
                    }
                    break;
                case 'thoughts':
                    showToast('💭 Загружаю мысли психолога...', 'info');
                    try {
                        const thought = await window.api.getPsychologistThought(CONFIG.USER_ID);
                        if (thought) {
                            showToast(thought.substring(0, 200) + '...', 'info');
                        } else {
                            showToast(modeConfig.greeting, 'info');
                        }
                    } catch (error) {
                        showToast('Не удалось загрузить мысли', 'error');
                    }
                    break;
                case 'progress':
                    showToast('📊 Ваш прогресс: 3 дня активной работы, 12 сессий. Продолжайте в том же духе!', 'info');
                    break;
                case 'advice':
                    showToast(`✨ ${modeConfig.voicePrompt} Я готов вас выслушать.`, 'info');
                    break;
            }
        }
        
        async function loadProfileData() {
            try {
                const status = await window.api.getUserStatus(CONFIG.USER_ID);
                const profileCodeEl = document.getElementById('profileCode');
                if (profileCodeEl && status.profile_code) {
                    profileCodeEl.textContent = status.profile_code;
                }
            } catch (error) {
                console.warn('Failed to load profile data', error);
            }
        }
        
        function initMobileMenu() {

            const chatsPanel = document.getElementById('chatsPanel');
            if (menuBtn && chatsPanel) {
                menuBtn.addEventListener('click', () => {

            }
        }
