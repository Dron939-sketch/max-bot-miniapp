    <script>

        // КЛАСС ДАШБОРДА

        class FrediDashboard {
            static API_BACKEND_URL = 'https://max-bot-1-ywpz.onrender.com';
            
            constructor() {
                // Предотвращаем множественную инициализацию
                if (window.dashboardInstance) {
                    console.log('⚠️ Dashboard уже существует');
                    return window.dashboardInstance;
                }
                
                window.dashboardInstance = this;
                
                // Фиксированный USER_ID
                this.userId = 213102077;
                this.userName = 'Андрей';
                
                // Сохраняем в localStorage
                localStorage.setItem('fredi_user_id', this.userId);
                localStorage.setItem('userName', this.userName);
                
                console.log('🎯 FrediDashboard инициализирован');
                console.log('👤 user_id:', this.userId);
                console.log('👤 user_name:', this.userName);
                
                this.userData = null;
                this.isTestCompleted = true; // ПРИНУДИТЕЛЬНО ПРОПУСКАЕМ ТЕСТ
                this.profileCode = 'СБ-4_ТФ-4_УБ-4_ЧВ-4';
                this.mode = 'coach';
                this.daysActive = 3;
                this.sessionsCount = 12;
                this.profileText = 'Ваш психологический профиль формируется. Скоро здесь будет персональный анализ.';
                this.psychologistThought = 'Здравствуйте! Я Фреди, ваш виртуальный психолог. Готов помочь вам разобраться в любых вопросах. Нажмите на кнопку микрофона и задайте свой вопрос.';
                this.refreshInterval = null;
                this.voiceObserver = null;
                
                this.cache = new Map();
                this.allModules = [
                    { id: 'strategy', name: '🎯 Стратегия', icon: '🎯', color: '#4CAF50', description: 'Построение планов и достижение целей' },
                    { id: 'reputation', name: '🏆 Репутация', icon: '🏆', color: '#FF9800', description: 'Управление впечатлением' },
                    { id: 'goals', name: '📊 Цели', icon: '📊', color: '#2196F3', description: 'Ваши цели и задачи' },
                    { id: 'psychology', name: '🧠 Психология', icon: '🧠', color: '#E91E63', description: 'Глубинные паттерны' },
                    { id: 'habits', name: '🔄 Привычки', icon: '🔄', color: '#00BCD4', description: 'Полезные привычки' },
                    { id: 'communication', name: '💬 Общение', icon: '💬', color: '#3F51B5', description: 'Советы по общению' },
                    { id: 'health', name: '❤️ Здоровье', icon: '❤️', color: '#F44336', description: 'Забота о себе' }
                ];
                
                this.init();
            }
            
            getApiBaseUrl() {
                return window.API_BASE_URL || FrediDashboard.API_BACKEND_URL;
            }
            
            async init() {
                console.log('🎯 Инициализация личного кабинета...');
                this.renderDashboard();
                this.startAutoRefresh();
                
                setTimeout(() => {
                    this.initVoiceButton();
                }, 500);
            }
            
            renderDashboard() {
                const container = document.getElementById('screenContainer');
                if (!container) return;
                this.renderMainDashboard(container);
            }
            
            renderMainDashboard(container) {
                container.innerHTML = `
                    <div class="dashboard-container">
                        <div class="dashboard-header">
                            <div class="user-welcome">
                                <div class="user-avatar">${this.userName.charAt(0)}</div>

                                </div>
                            </div>

                                    <div class="stat-value">${this.daysActive}</div>
                                    <div class="stat-label">дней с вами</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">${this.sessionsCount}</div>
                                    <div class="stat-label">сессий</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="voice-input-dashboard" id="voiceInputDashboard">
                            <button class="voice-record-btn-large" id="dashboardVoiceBtn">
                                <span class="voice-icon">🎤</span>
                                <span class="voice-text">Нажмите и удерживайте для записи</span>
                            </button>
                            <div class="voice-status-dashboard" id="voiceStatusDashboard" style="display: none;">
                                <span class="recording-pulse"></span>
                                <span class="recording-text">Запись...</span>
                                <span class="recording-timer" id="dashboardRecordingTimer">0s</span>
                            </div>
                        </div>
                        
                        <div class="modules-grid">
                            ${this.allModules.map(module => `
                                <div class="module-card" data-module="${module.id}" style="border-left-color: ${module.color}">
                                    <div class="module-icon">${module.icon}</div>
                                    <div class="module-name">${module.name}</div>
                                    <div class="module-desc">${module.description}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="quick-actions">
                            <div class="quick-actions-title">⚡ Быстрые действия</div>
                            <div class="quick-actions-grid">
                                <div class="quick-action" data-action="mode">
                                    <div class="action-icon">⚙️</div>
                                    <div class="action-name">Сменить режим</div>
                                </div>
                                <div class="quick-action" data-action="profile">
                                    <div class="action-icon">🧠</div>
                                    <div class="action-name">Мой портрет</div>
                                </div>
                                <div class="quick-action" data-action="thoughts">
                                    <div class="action-icon">💭</div>
                                    <div class="action-name">Мысли психолога</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="floating-message" id="floatingMessage" style="display: none;">
                            <div class="floating-message-content">
                                <div class="floating-message-text" id="floatingMessageText"></div>
                                <div class="floating-message-close" id="floatingMessageClose">✕</div>
                            </div>
                        </div>
                    </div>
                `;
                
                this.attachEvents();
                
                setTimeout(() => {
                    this.initVoiceButton();
                }, 200);
            }
            
            attachEvents() {
                document.querySelectorAll('.module-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const moduleId = card.dataset.module;
                        this.showFloatingMessage(`Модуль "${card.querySelector('.module-name').textContent}" скоро будет доступен`, 'info');
                    });
                });
                
                document.querySelectorAll('.quick-action').forEach(action => {
                    action.addEventListener('click', () => {
                        const actionType = action.dataset.action;
                        this.handleQuickAction(actionType);
                    });
                });
            }
            
            handleQuickAction(actionType) {
                switch(actionType) {
                    case 'mode':
                        this.showFloatingMessage('Режимы: КОУЧ, ПСИХОЛОГ, ТРЕНЕР. Выберите в настройках', 'info');
                        break;
                    case 'profile':
                        this.showFloatingMessage(this.profileText, 'info');
                        break;
                    case 'thoughts':
                        this.showFloatingMessage(this.psychologistThought, 'info');
                        break;
                }
            }
            
            initVoiceButton() {
                if (this.voiceObserver) {
                    this.voiceObserver.disconnect();
                }
                
                const waitForButton = () => {
                    const btn = document.getElementById('dashboardVoiceBtn');
                    if (btn) {
                        this.setupVoiceButton(btn);
                        return true;
                    }
                    return false;
                };
                
                if (waitForButton()) return;
                
                this.voiceObserver = new MutationObserver(() => {
                    if (waitForButton()) {
                        this.voiceObserver.disconnect();
                        this.voiceObserver = null;
                    }
                });
                
                this.voiceObserver.observe(document.body, { childList: true, subtree: true });
                
                setTimeout(() => {
                    if (this.voiceObserver) {
                        this.voiceObserver.disconnect();
                        this.voiceObserver = null;
                        const btn = document.getElementById('dashboardVoiceBtn');
                        if (!btn) console.warn('⚠️ Кнопка микрофона не найдена');
                    }
                }, 5000);
            }
            
            setupVoiceButton(btn) {
                if (btn.dataset.initialized === 'true') return;
                btn.dataset.initialized = 'true';
                
                console.log('🎤 Инициализация микрофона');
                
                let pressTimer = null;
                let isPressing = false;
                
                const onStart = (e) => {
                    e.preventDefault();
                    if (isPressing) return;
                    isPressing = true;
                    btn.style.transform = 'scale(0.98)';
                    
                    pressTimer = setTimeout(() => {
                        if (isPressing) {
                            btn.style.transform = '';
                            this.startRecording();
                        }
                    }, 150);
                };
                
                const onEnd = () => {
                    if (pressTimer) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                    if (isPressing) {
                        this.stopRecording();
                    }
                    isPressing = false;
                    btn.style.transform = '';
                };
                
                btn.addEventListener('mousedown', onStart);
                btn.addEventListener('mouseup', onEnd);
                btn.addEventListener('mouseleave', onEnd);
                btn.addEventListener('touchstart', onStart, { passive: false });
                btn.addEventListener('touchend', onEnd, { passive: false });
                btn.addEventListener('touchcancel', onEnd, { passive: false });
            }
            
            async startRecording() {
                console.log('🎤 Начало записи');
                const btn = document.getElementById('dashboardVoiceBtn');
                if (btn) {
                    btn.classList.add('recording');
                    btn.querySelector('.voice-text').textContent = '🎙️ Запись... отпустите для отправки';
                }
                
                const statusDiv = document.getElementById('voiceStatusDashboard');
                if (statusDiv) statusDiv.style.display = 'flex';
                
                let timer = 0;
                const timerInterval = setInterval(() => {
                    timer++;
                    const timerEl = document.getElementById('dashboardRecordingTimer');
                    if (timerEl) timerEl.textContent = `${timer}s`;
                    if (timer >= 60) {
                        clearInterval(timerInterval);
                        this.stopRecording();
                    }
                }, 1000);
                
                window.currentRecordingTimer = timerInterval;
                
                // Имитация записи (в реальном приложении здесь был бы MediaRecorder)
                setTimeout(() => {
                    if (window.currentRecordingTimer) {
                        clearInterval(window.currentRecordingTimer);
                        window.currentRecordingTimer = null;
                    }
                }, 60000);
            }
            
            stopRecording() {
                console.log('🎤 Остановка записи');
                
                if (window.currentRecordingTimer) {
                    clearInterval(window.currentRecordingTimer);
                    window.currentRecordingTimer = null;
                }
                
                const btn = document.getElementById('dashboardVoiceBtn');
                if (btn) {
                    btn.classList.remove('recording');
                    btn.querySelector('.voice-text').textContent = 'Нажмите и удерживайте для записи';
                }
                
                const statusDiv = document.getElementById('voiceStatusDashboard');
                if (statusDiv) statusDiv.style.display = 'none';
                
                this.showFloatingMessage('🎤 Голосовое сообщение отправлено! Скоро я отвечу.', 'success');
            }
            
            showFloatingMessage(text, type = 'info') {
                const msg = document.getElementById('floatingMessage');
                const textEl = document.getElementById('floatingMessageText');
                if (!msg || !textEl) return;
                
                textEl.innerHTML = text;
                msg.className = `floating-message ${type}`;
                msg.style.display = 'block';
                
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 4000);
                
                const closeBtn = document.getElementById('floatingMessageClose');
                if (closeBtn) closeBtn.onclick = () => msg.style.display = 'none';
            }
            
            startAutoRefresh() {
                if (this.refreshInterval) clearInterval(this.refreshInterval);
                this.refreshInterval = setInterval(() => {
                    if (document.visibilityState === 'visible') {
                        console.log('🔄 Автообновление');
                    }
                }, 300000);
            }
        }
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 DOM загружен');
            
            // Обновляем отображение имени
            const userNameSpan = document.getElementById('userName');
            if (userNameSpan) userNameSpan.textContent = 'Андрей';
            
            const avatarInitial = document.getElementById('userAvatarInitial');
            if (avatarInitial) avatarInitial.textContent = 'А';
            
            // Создаем дашборд
            if (!window.dashboardInstance) {
                window.dashboard = new FrediDashboard();
            }
            
            // Мобильное меню
            const menuBtn = document.getElementById('mobileMenuBtn');
            const chatsPanel = document.getElementById('chatsPanel');
            if (menuBtn && chatsPanel) {
                menuBtn.addEventListener('click', () => {
                    chatsPanel.classList.toggle('open');
                });
            }
        });
        
        console.log('✅ Приложение загружено, тест пропущен, ID установлен: 213102077');
    </script>
</body>
</html>
