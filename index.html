    <!-- ========== УНИВЕРСАЛЬНОЕ ПОЛУЧЕНИЕ USER_ID ========== -->
    <script>
        // ============================================
        // ДИАГНОСТИКА
        // ============================================
        console.log('=== ДИАГНОСТИКА ===');
        console.log('navigator.userAgent:', navigator.userAgent);
        console.log('location.href:', location.href);
        console.log('location.hash:', location.hash);
        
        // ============================================
        // 1. УНИВЕРСАЛЬНОЕ ПОЛУЧЕНИЕ USER_ID
        // ============================================
        function extractUserIdFromUrl() {
            const url = window.location.href;
            const decodedUrl = decodeURIComponent(url);
            console.log('🔍 Декодированный URL:', decodedUrl.substring(0, 500));
            
            // Ищем chat_id (основной ID)
            const chatPatterns = [
                /chat%22%3A%7B%22id%22%3A(\d+)/i,
                /chat":\{"id":(\d+)/i,
                /chat%3D%257B%2522id%2522%253A(\d+)/i,
                /chat":{"id":(\d+)/i,
                /"chat":\{"id":(\d+)/i
            ];
            
            for (const pattern of chatPatterns) {
                const match = decodedUrl.match(pattern);
                if (match && match[1]) {
                    const id = parseInt(match[1]);
                    if (id > 100000) {
                        console.log(`✅ Найден CHAT_ID: ${id}`);
                        return id;
                    }
                }
            }
            
            // Ищем user_id
            const userPatterns = [
                /user%22%3A%7B%22id%22%3A(\d+)/i,
                /user":\{"id":(\d+)/i,
                /user%3D%257B%2522id%2522%253A(\d+)/i,
                /user":{"id":(\d+)/i
            ];
            
            for (const pattern of userPatterns) {
                const match = decodedUrl.match(pattern);
                if (match && match[1]) {
                    const id = parseInt(match[1]);
                    if (id > 100000) {
                        console.log(`⚠️ Найден USER_ID: ${id}`);
                        return id;
                    }
                }
            }
            
            return null;
        }
        
        // ============================================
        // 2. ПОЛУЧЕНИЕ ИМЕНИ ПОЛЬЗОВАТЕЛЯ
        // ============================================
        function extractUserNameFromUrl() {
            const url = window.location.href;
            const decodedUrl = decodeURIComponent(url);
            
            const patterns = [
                /first_name%22%3A%22([^%]+?)%22/i,
                /first_name":"([^"]+?)"/i,
                /first_name%22%3A%22([^"]+?)%22/i
            ];
            
            for (const pattern of patterns) {
                const match = decodedUrl.match(pattern);
                if (match && match[1]) {
                    let name = match[1];
                    name = name.replace(/["']/g, '').trim();
                    try {
                        name = decodeURIComponent(name);
                    } catch(e) {}
                    if (name && name.length > 0 && name.length < 50) {
                        console.log(`✅ Найдено имя: ${name}`);
                        return name;
                    }
                }
            }
            return null;
        }
        
        // ============================================
        // 3. ИНИЦИАЛИЗАЦИЯ
        // ============================================
        (function init() {
            console.log('🚀 Инициализация приложения...');
            
            let userId = extractUserIdFromUrl();
            
            if (!userId) {
                const savedId = localStorage.getItem('fredi_user_id');
                if (savedId && !isNaN(parseInt(savedId)) && parseInt(savedId) > 100000) {
                    userId = parseInt(savedId);
                    console.log('✅ user_id из localStorage:', userId);
                }
            }
            
            if (userId) {
                localStorage.setItem('fredi_user_id', userId);
                console.log('🎯 Установлен user_id:', userId);
            } else {
                console.error('❌ Не удалось получить user_id!');
                const isDebug = new URLSearchParams(window.location.search).get('debug') === '1';
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                if (isDebug || isLocalhost) {
                    userId = 213102077;
                    localStorage.setItem('fredi_user_id', userId);
                    console.warn('⚠️ Режим отладки, тестовый ID:', userId);
                }
            }
            
            let userName = extractUserNameFromUrl();
            if (!userName) {
                userName = localStorage.getItem('userName') || 'друг';
            }
            if (userName && userName !== 'друг') {
                localStorage.setItem('userName', userName);
            }
            
            window.maxContext = {
                user_id: userId,
                user_name: userName,
                initialized: true
            };
            
            console.log('📦 maxContext:', {
                user_id: window.maxContext.user_id,
                user_name: window.maxContext.user_name
            });
            
            if (!userId && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
                document.body.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;background:#0e1621;color:white;">
                        <div>
                            <div style="font-size:64px;margin-bottom:20px;">🔐</div>
                            <h2 style="margin-bottom:12px;">Ошибка входа</h2>
                            <p style="color:#8e9aa6;margin-bottom:24px;line-height:1.6;">
                                Не удалось идентифицировать пользователя.<br>
                                Пожалуйста, откройте приложение через MAX.
                            </p>
                            <button onclick="location.reload()" style="padding:14px 32px;background:#248bf2;color:white;border:none;border-radius:40px;font-size:16px;cursor:pointer;">
                                🔄 ПОВТОРИТЬ
                            </button>
                        </div>
                    </div>
                `;
            }
        })();
    </script>

    <!-- ========== ПРОСТОЙ МЕНЕДЖЕР МИКРОФОНА (ДЛЯ ЛЮБОГО БРАУЗЕРА) ========== -->
    <script>
        window.maxMicrophoneManager = {
            hasPermission: false,
            isRecording: false,
            mediaRecorder: null,
            audioChunks: [],
            
            async requestMicrophone() {
                console.log('🎤 Запрос доступа к микрофону...');
                
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    console.error('❌ Микрофон не поддерживается');
                    this.showToast('❌ Микрофон не поддерживается', 'error');
                    return false;
                }
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    stream.getTracks().forEach(track => track.stop());
                    this.hasPermission = true;
                    localStorage.setItem('microphone_permission_granted', 'true');
                    this.showToast('✅ Микрофон готов!', 'success');
                    return true;
                } catch (error) {
                    console.error('❌ Ошибка:', error);
                    this.hasPermission = false;
                    
                    if (error.name === 'NotAllowedError') {
                        this.showPermissionInstructions();
                    } else if (error.name === 'NotFoundError') {
                        this.showToast('❌ Микрофон не найден', 'error');
                    } else {
                        this.showToast('❌ Не удалось получить доступ', 'error');
                    }
                    return false;
                }
            },
            
            showPermissionInstructions() {
                const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                const modal = document.createElement('div');
                modal.className = 'microphone-modal';
                modal.innerHTML = `
                    <div class="microphone-modal-content">
                        <div style="font-size:48px;margin-bottom:16px;">🎤</div>
                        <h3>Нужен доступ к микрофону</h3>
                        <div style="color:#8e9aa6;margin:16px 0;text-align:left;">
                            ${isMobile ? 
                                '1️⃣ Настройки телефона → Браузер → Разрешения<br>2️⃣ Микрофон → Разрешить<br>3️⃣ Обновите страницу' : 
                                'В адресной строке нажмите на иконку 🔒 → Разрешения → Микрофон → Разрешить<br>Затем обновите страницу'}
                        </div>
                        <div style="display:flex;gap:12px;flex-wrap:wrap;">
                            <button id="microphoneRetryBtn" class="modal-btn primary">🔄 ПРОВЕРИТЬ</button>
                            <button id="microphoneTextBtn" class="modal-btn secondary">📝 НАПИСАТЬ ТЕКСТ</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('microphoneRetryBtn')?.addEventListener('click', () => { modal.remove(); this.requestMicrophone(); });
                document.getElementById('microphoneTextBtn')?.addEventListener('click', () => { modal.remove(); document.getElementById('questionInput')?.focus(); });
            },
            
            async startRecording() {
                if (!this.hasPermission && !(await this.requestMicrophone())) return false;
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    this.mediaRecorder = new MediaRecorder(stream);
                    this.audioChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) this.audioChunks.push(event.data);
                    };
                    
                    this.mediaRecorder.onstop = () => {
                        const blob = new Blob(this.audioChunks, { type: 'audio/webm' });
                        stream.getTracks().forEach(track => track.stop());
                        this.processAudio(blob);
                    };
                    
                    this.mediaRecorder.start();
                    this.isRecording = true;
                    
                    // Таймер
                    const timerDiv = document.getElementById('recordingTimer');
                    if (timerDiv) {
                        timerDiv.style.display = 'block';
                        let sec = 0;
                        this.timerInterval = setInterval(() => timerDiv.textContent = `${++sec}s`, 1000);
                    }
                    
                    // Меняем кнопку
                    const btn = document.getElementById('voiceRecordBtn');
                    if (btn) {
                        btn.classList.add('recording');
                        btn.innerHTML = '⏹️';
                    }
                    
                    return true;
                } catch (error) {
                    this.showToast('❌ Не удалось начать запись', 'error');
                    return false;
                }
            },
            
            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    
                    if (this.timerInterval) clearInterval(this.timerInterval);
                    document.getElementById('recordingTimer').style.display = 'none';
                    
                    const btn = document.getElementById('voiceRecordBtn');
                    if (btn) {
                        btn.classList.remove('recording');
                        btn.innerHTML = '🎤';
                    }
                }
            },
            
            async processAudio(blob) {
                if (blob.size < 1000) {
                    this.showToast('🎤 Слишком тихо', 'error');
                    return;
                }
                
                this.showToast('🎤 Распознаю...', 'info');
                
                try {
                    const userId = window.maxContext?.user_id || localStorage.getItem('fredi_user_id');
                    const formData = new FormData();
                    formData.append('user_id', userId);
                    formData.append('voice', blob, 'recording.webm');
                    
                    const response = await fetch(`${window.API_BASE_URL}/api/voice/process`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success && result.recognized_text) {
                        this.showToast('✅ Распознано!', 'success');
                        const input = document.getElementById('questionInput');
                        if (input) {
                            input.value = result.recognized_text;
                            document.getElementById('sendQuestionBtn')?.click();
                        }
                    } else {
                        this.showToast(result.answer || '❌ Не распознано', 'error');
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                    this.showToast('❌ Ошибка отправки', 'error');
                }
            },
            
            showToast(msg, type) {
                const toast = document.getElementById('toastMessage');
                if (toast) {
                    toast.textContent = msg;
                    toast.className = `toast-message ${type} show`;
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
            }
        };
        
        // Инициализация
        setTimeout(() => window.maxMicrophoneManager.requestMicrophone(), 1000);
        
        // Обработчик кнопки (простой режим)
        document.addEventListener('DOMContentLoaded', () => {
            const voiceBtn = document.getElementById('voiceRecordBtn');
            if (voiceBtn) {
                voiceBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (window.maxMicrophoneManager.isRecording) {
                        window.maxMicrophoneManager.stopRecording();
                    } else {
                        await window.maxMicrophoneManager.startRecording();
                    }
                });
            }
            
            if (typeof FrediDashboard !== 'undefined') {
                window.dashboard = new FrediDashboard();
            }
        });
    </script>
</body>
</html>
