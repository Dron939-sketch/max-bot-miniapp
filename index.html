    <script>
        // ===== ПОЛУЧЕНИЕ USER_ID ОТ MAX =====
        (function() {
            // Получаем параметры из URL (MAX передаёт их автоматически)
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const chatId = urlParams.get('chat_id');
            const accessToken = urlParams.get('access_token');
            
            // Сохраняем глобально для использования во всех скриптах
            window.maxContext = {
                user_id: userId,
                chat_id: chatId,
                access_token: accessToken
            };
            
            if (userId) {
                console.log('👤 Пользователь MAX ID:', userId);
                // Можно сразу запросить данные пользователя
                if (window.api) {
                    window.api.getUserStatus(userId).then(data => {
                        console.log('📊 Данные пользователя:', data);
                        // Обновим имя в приветствии, если нужно
                        const nameElement = document.getElementById('userNamePlaceholder');
                        if (nameElement && data.user_name) {
                            nameElement.textContent = data.user_name;
                        }
                    });
                }
            } else {
                console.warn('⚠️ user_id не получен от MAX, используем тестовый режим');
                window.maxContext = { user_id: 12345, test_mode: true };
            }
        })();

        // ===== ПОЛУЧЕНИЕ ТЕМЫ ОТ MAX =====
        (function() {
            // Функция применения темы
            function applyMaxTheme(theme) {
                console.log('🎨 Применяем тему MAX:', theme);
                
                // Устанавливаем CSS переменные из темы MAX
                const root = document.documentElement;
                
                // Основные цвета
                root.style.setProperty('--max-bg', theme.bg_color || '#0e1621');
                root.style.setProperty('--max-panel-bg', theme.secondary_bg_color || '#17212b');
                root.style.setProperty('--max-header-bg', theme.header_bg_color || '#1f2c38');
                root.style.setProperty('--max-input-bg', theme.input_bg_color || '#1f2c38');
                root.style.setProperty('--max-text', theme.text_color || '#ffffff');
                root.style.setProperty('--max-text-secondary', theme.hint_color || '#8e9aa6');
                root.style.setProperty('--max-border', theme.separator_color || '#0f1b26');
                root.style.setProperty('--max-hover', theme.section_bg_color || '#2b3b4a');
                root.style.setProperty('--max-blue', theme.accent_text_color || '#248bf2');
                
                // Цвета сообщений
                root.style.setProperty('--max-message-bot', theme.message_bg_color || '#1f2c38');
                root.style.setProperty('--max-message-user', theme.message_user_bg_color || '#2b5278');
                
                // Кнопки
                root.style.setProperty('--max-button-primary', theme.button_color || '#248bf2');
                root.style.setProperty('--max-button-secondary', theme.section_bg_color || '#2b3b4a');
                
                // Применяем к body
                document.body.style.backgroundColor = theme.bg_color || '#0e1621';
                document.body.style.color = theme.text_color || '#ffffff';
                
                // Сохраняем тему
                localStorage.setItem('max_theme', JSON.stringify(theme));
            }
            
            // Пытаемся получить тему от MAX
            if (window.MAX?.WebApp) {
                try {
                    const theme = window.MAX.WebApp.themeParams;
                    if (theme) {
                        applyMaxTheme(theme);
                    }
                    
                    // Подписываемся на изменение темы
                    window.MAX.WebApp.onEvent('themeChanged', function(newTheme) {
                        applyMaxTheme(newTheme);
                    });
                } catch (e) {
                    console.warn('❌ Ошибка получения темы MAX:', e);
                }
            } else {
                console.log('⚠️ MAX API не доступен, используем тему по умолчанию');
                // Загружаем сохраненную тему или используем дефолтную
                try {
                    const savedTheme = localStorage.getItem('max_theme');
                    if (savedTheme) {
                        applyMaxTheme(JSON.parse(savedTheme));
                    }
                } catch (e) {
                    console.warn('❌ Ошибка загрузки темы:', e);
                }
            }
        })();
    </script>
