<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Фреди | Премиум виртуальный психолог</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black-obsidian: #0a0a0a;
            --black-matte: #111111;
            --carbon-fiber: #1a1a1a;
            --glass-dark: rgba(10, 10, 10, 0.85);
            
            --chrome: #e0e0e0;
            --silver-metallic: #c0c0c0;
            --silver-brushed: #b0b0b0;
            --platinum: #a0a0a0;
            
            --amg-red: #ff3b3b;
            --amg-orange: #ff6b3b;
            --amg-blue: #3b82ff;
            --amber: #ffb83b;
            
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --glow-iphone: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 255, 255, 0.3);
            
            --text-primary: #ffffff;
            --text-secondary: #a0a3b0;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black-obsidian);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(224, 224, 224, 0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(255, 59, 59, 0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(224, 224, 224, 0.008) 0px, rgba(224, 224, 224, 0.008) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Левая панель */
        .chats-panel {
            width: 280px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(224, 224, 224, 0.15);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: left 0.3s ease;
            z-index: 20;
            position: relative;
        }

        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                width: 260px;
            }
            
            .chats-panel.open {
                left: 0;
                box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
            }
        }

        .chats-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
        }

        .chats-title {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chats-search {
            padding: 12px 16px;
        }

        .chats-search input {
            width: 100%;
            padding: 10px 16px;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 12px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(224, 224, 224, 0.08);
            border-color: rgba(224, 224, 224, 0.2);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.1), rgba(192, 192, 192, 0.05));
            border-color: rgba(224, 224, 224, 0.3);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
        }

        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--black-obsidian);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-time {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .chats-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 16px;
            background: rgba(224, 224, 224, 0.05);
            cursor: pointer;
        }

        .user-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--black-obsidian);
        }

        .user-mini-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-mini-status {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Правая панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(224, 224, 224, 0.1);
            border: none;
            font-size: 22px;
            color: var(--chrome);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
        }

        .chat-header-status {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulseMode 2s infinite;
        }

        @keyframes pulseMode {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* ========== ОБЩИЕ СТИЛИ ДЛЯ СТРАНИЦ ========== */
        .full-content-page {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(26, 26, 26, 0.85));
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            animation: contentAppear 0.3s ease-out;
        }

        @keyframes contentAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            background: rgba(224, 224, 224, 0.1);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 40px;
            padding: 10px 20px;
            color: var(--chrome);
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .content-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.2);
        }

        .content-emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .content-title {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .content-body {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 12px;
        }

        /* ========== КАРТОЧКИ ДЛЯ ЭЛЕМЕНТОВ ========== */
        .elements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .confinement-element {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(224, 224, 224, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .confinement-element:hover {
            transform: translateY(-3px);
            border-color: var(--chrome);
            box-shadow: 0 5px 20px rgba(224, 224, 224, 0.1);
        }

        .element-number {
            font-size: 18px;
            font-weight: bold;
            color: var(--chrome);
            margin-bottom: 6px;
        }

        .element-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .element-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .element-meta {
            display: flex;
            gap: 8px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ========== КЛЮЧЕВОЙ КОНФАЙНТМЕНТ ========== */
        .key-confinement {
            background: linear-gradient(135deg, rgba(255, 107, 59, 0.15), rgba(255, 59, 59, 0.1));
            border: 1px solid var(--amg-orange);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .key-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .key-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--amg-orange);
        }

        .key-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== ПЕТЛИ ========== */
        .loop-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .loop-type {
            font-weight: bold;
            color: var(--chrome);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .loop-desc {
            font-size: 12px;
            margin-bottom: 6px;
        }

        .loop-strength {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ========== ИНТЕРВЕНЦИЯ ========== */
        .intervention-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }

        .intervention-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .daily-practice {
            background: rgba(224, 224, 224, 0.03);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            border-left: 3px solid var(--chrome);
        }

        /* ========== ПРАКТИКИ ========== */
        .practice-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin: 12px 0;
        }

        .quote-card {
            background: rgba(224, 224, 224, 0.03);
            border-radius: 16px;
            padding: 16px;
            font-style: italic;
            text-align: center;
            margin: 12px 0;
        }

        /* ========== СКАЗКИ ========== */
        .tale-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tale-card:hover {
            background: rgba(224, 224, 224, 0.1);
            transform: translateX(5px);
        }

        /* ========== ЯКОРЯ ========== */
        .anchor-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .anchor-phrase {
            font-size: 13px;
            font-weight: 500;
        }

        /* ========== СТАТИСТИКА ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .stat-card {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--chrome);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ========== ГИПНОЗ ========== */
        .hypno-input {
            width: 100%;
            padding: 14px;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 30px;
            color: var(--text-primary);
            margin-bottom: 12px;
            resize: none;
        }

        .hypno-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .topic-btn {
            padding: 8px 16px;
            background: rgba(224, 224, 224, 0.1);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 30px;
            color: var(--chrome);
            cursor: pointer;
            font-size: 12px;
        }

        /* ========== ВСПОМОГАТЕЛЬНЫЕ КНОПКИ ========== */
        .action-btn {
            padding: 12px 20px;
            background: rgba(224, 224, 224, 0.1);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 40px;
            color: var(--chrome);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin: 8px 0;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            color: var(--black-obsidian);
            font-weight: bold;
        }

        /* ========== МОДУЛИ И БЫСТРЫЕ ДЕЙСТВИЯ ========== */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .module-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(224, 224, 224, 0.1);
            text-align: center;
        }

        .module-card:active {
            transform: scale(0.98);
        }

        .module-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .module-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .quick-actions {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.5), rgba(26, 26, 26, 0.4));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .quick-action {
            background: rgba(224, 224, 224, 0.05);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(224, 224, 224, 0.1);
        }

        .quick-action:active {
            transform: scale(0.96);
        }

        .action-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .action-name {
            font-size: 11px;
            font-weight: 500;
        }

        .expandable-section {
            margin-top: 20px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
            padding-top: 16px;
        }

        .expandable-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
            color: var(--chrome);
        }

        .expandable-content {
            display: none;
            padding-top: 12px;
        }

        .expandable-content.open {
            display: block;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.2), rgba(192, 192, 192, 0.1));
            color: var(--text-primary);
            animation: iphoneGlow 2s infinite;
        }

        @keyframes iphoneGlow {
            0% { box-shadow: 0 0 0 0 rgba(224, 224, 224, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(224, 224, 224, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(224, 224, 224, 0); }
        }

        .voice-section {
            margin-bottom: 32px;
        }

        .voice-card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7), rgba(26, 26, 26, 0.6));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .voice-record-btn-premium {
            width: 100%;
            padding: 20px 24px;
            border-radius: 54px;
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.1), rgba(192, 192, 192, 0.05));
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: 500;
            touch-action: manipulation;
            user-select: none;
        }

        .voice-record-btn-premium:active {
            transform: scale(0.98);
        }

        .voice-record-btn-premium.recording {
            background: linear-gradient(135deg, rgba(255, 59, 59, 0.25), rgba(239, 68, 68, 0.15));
            border-color: var(--amg-red);
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.3); }
            50% { box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); }
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(224, 224, 224, 0.05), rgba(192, 192, 192, 0.02));
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(224, 224, 224, 0.15);
        }

        .user-greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .greeting-text h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .greeting-text p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .profile-badge {
            background: rgba(224, 224, 224, 0.08);
            border-radius: 30px;
            padding: 6px 16px;
            text-align: center;
            border: 1px solid rgba(224, 224, 224, 0.2);
        }

        .profile-code {
            font-family: monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--chrome), var(--silver-brushed));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .floating-message {
            position: fixed;

        function showFullContentScreen(title, content, contentType, rawText = null) {

                questions: '❓',

                doubles: '👥',

                confinement: '🔐',
                practices: '🧘',
                hypnosis: '🌙',
                tales: '📚',
                anchors: '⚓',
                statistics: '📊'
            };
            
            const formattedContent = typeof content === 'string' ? formatContentForDisplay(content) : content;
            
            container.innerHTML = `
                <div class="full-content-page">
                    <button class="back-btn" id="backBtn">◀️ НАЗАД</button>
                    <div class="content-header">
                        <div class="content-emoji">${emojiMap[contentType] || '📄'}</div>

                    </div>
                    <div class="content-body" id="contentBody">

                    </div>
                    <button class="action-btn primary-btn" id="speakBtn" style="margin-top: 20px;">🔊 Озвучить</button>
                </div>
            `;
            
            document.getElementById('backBtn').onclick = () => navigateBack();
            document.getElementById('speakBtn').onclick = async () => {
                const textToSpeak = rawText || (typeof content === 'string' ? content.replace(/\*\*(.*?)\*\*/g, '$1') : '');

                const tts = await textToSpeech(textToSpeak, currentMode);
                if (tts?.audio_url) playAudioResponse(tts.audio_url);
            };
        }
        
        function formatContentForDisplay(text) {
            if (!text) return '<p>Нет данных</p>';
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            const headerEmojis = '🔑💪🎯🌱⚠️🔐🔄🚪📊🧠💭💕🕊️✨🏆👥🎨';
            const headerRegex = new RegExp(`([${headerEmojis}])\\s*\\*\\*(.*?)\\*\\*`, 'g');
            formatted = formatted.replace(headerRegex, 
                '<div class="section-header"><span class="section-emoji">$1</span><strong class="section-title">$2</strong></div>');
            formatted = formatted.replace(/•\s*(.*?)(?=\n|$)/g, '<li>$1</li>');
            const paragraphs = formatted.split('\n\n');
            formatted = paragraphs.map(p => {
                if (p.trim().startsWith('<li>')) return `<ul class="styled-list">${p}</ul>`;
                if (p.trim().startsWith('<div class="section-header')) return p;
                return `<p>${p}</p>`;
            }).join('');
            return formatted;
        }

        // ========== ГОЛОСОВАЯ ЗАПИСЬ ==========
        
        async function startRecordingWithHold() {
            if (isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    if (audioBlob.size > 5000) {
                        addMessage('🎙️ Распознаю речь...', 'system');
                        const result = await sendVoiceToServer(audioBlob);
                        if (result.success) {
                            if (result.recognized_text) addMessage(`🎤 "${result.recognized_text}"`, 'system');
                            if (result.answer) addMessage(result.answer, 'bot');
                            if (result.audio_url) playAudioResponse(result.audio_url);
                        } else {
                            addMessage(`❌ ${result.error || 'Не удалось распознать речь'}`, 'system');
                        }
                    } else {
                        addMessage('Запись слишком короткая', 'system');
                    }
                    stream.getTracks().forEach(track => track.stop());
                    const voiceBtn = document.getElementById('mainVoiceBtn');
                    if (voiceBtn) {
                        voiceBtn.classList.remove('recording');
                        voiceBtn.querySelector('.voice-icon').textContent = '🎤';
                        voiceBtn.querySelector('.voice-text').textContent = MODES[currentMode].voicePrompt;
                    }
                    isRecording = false;
                    if (recordingTimer) clearInterval(recordingTimer);
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                
                const voiceBtn = document.getElementById('mainVoiceBtn');
                if (voiceBtn) {
                    voiceBtn.classList.add('recording');
                    voiceBtn.querySelector('.voice-icon').textContent = '⏹️';
                    voiceBtn.querySelector('.voice-text').textContent = 'Отпустите для отправки';
                }
                
                recordingTimer = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 60000);
                
            } catch (error) {
                showToast('❌ Не удалось получить доступ к микрофону', 'error');
            }
        }
        
        function initVoiceButton() {
            const voiceBtn = document.getElementById('mainVoiceBtn');
            if (!voiceBtn) return;
            if (voiceBtn.dataset.initialized === 'true') return;
            voiceBtn.dataset.initialized = 'true';
            
            let pressTimer = null;
            let isPressing = false;
            
            const onStart = () => {
                if (isPressing) return;
                isPressing = true;
                pressTimer = setTimeout(() => {
                    if (isPressing) startRecordingWithHold();
                }, 150);
            };
            
            const onEnd = () => {
                if (pressTimer) clearTimeout(pressTimer);
                if (isPressing && isRecording && mediaRecorder) mediaRecorder.stop();
                isPressing = false;
            };
            
            voiceBtn.addEventListener('mousedown', onStart);
            voiceBtn.addEventListener('mouseup', onEnd);
            voiceBtn.addEventListener('mouseleave', onEnd);
            voiceBtn.addEventListener('touchstart', onStart, { passive: false });
            voiceBtn.addEventListener('touchend', onEnd, { passive: false });
            voiceBtn.addEventListener('touchcancel', onEnd, { passive: false });
        }
        
        // ========== UI ФУНКЦИИ ==========
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            const textEl = document.getElementById('toastText');
            if (!toast || !textEl) return;
            textEl.textContent = message;
            toast.className = `floating-message ${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
            const closeBtn = document.getElementById('toastClose');
            if (closeBtn) closeBtn.onclick = () => toast.style.display = 'none';
        }
        
        function addMessage(text, sender = 'bot', audioUrl = null) {
            const container = document.getElementById('screenContainer');
            if (!container) return;
            if (container.querySelector('.loading-screen')) container.innerHTML = '';
            let messagesContainer = container.querySelector('.chat-messages');
            if (!messagesContainer) {
                messagesContainer = document.createElement('div');
                messagesContainer.className = 'chat-messages';
                container.appendChild(messagesContainer);
            }
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const textSpan = document.createElement('div');
            textSpan.textContent = text;
            messageDiv.appendChild(textSpan);
            if (audioUrl) {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = audioUrl;
                messageDiv.appendChild(audio);
            }
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
