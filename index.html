<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Фреди · виртуальный психолог</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#248bf2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Фреди">

    <!-- MAX Bridge -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    
    <!-- ========== СТИЛИ ========== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        
        .chats-panel {
            width: 280px;
            background: var(--max-panel-bg, #17212b);
            border-right: 1px solid var(--max-border, #0f1b26);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 20;
        }
        
        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                width: 280px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            }
            .chats-panel.open {
                transform: translateX(0);
            }
        }
        
        .chats-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--max-border, #0f1b26);
        }
        
        .chats-title {
            font-size: 20px;
            font-weight: bold;
        }
        
        .new-chat-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--max-blue, #248bf2);
            padding: 8px;
        }
        
        .chats-search {
            padding: 12px;
        }
        
        .chats-search input {
            width: 100%;
            padding: 10px 14px;
            background: var(--max-input-bg, #1f2c38);
            border: none;
            border-radius: 20px;
            color: var(--max-text, white);
            font-size: 14px;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: var(--max-hover, #2b3b4a);
        }
        
        .chat-item.active {
            background: var(--max-hover, #2b3b4a);
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 12px;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .chat-preview {
            font-size: 12px;
            color: var(--max-text-secondary, #8e9aa6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 11px;
            color: var(--max-text-secondary, #8e9aa6);
        }
        
        .chats-footer {
            padding: 16px;
            border-top: 1px solid var(--max-border, #0f1b26);
        }
        
        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .user-mini-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-mini-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-mini-status {
            font-size: 11px;
            color: var(--max-text-secondary, #8e9aa6);
        }
        
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--max-bg, #0e1621);
            overflow: hidden;
        }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--max-header-bg, #1f2c38);
            border-bottom: 1px solid var(--max-border, #0f1b26);
        }
        
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--max-text, white);
            padding: 8px;
        }
        
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }
        
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-header-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .chat-header-status {
            font-size: 12px;
            color: var(--max-text-secondary, #8e9aa6);
        }
        
        .header-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--max-text, white);
            padding: 8px;
        }
        
        .screen-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
            padding: 20px;
        }
        
        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: var(--max-text-secondary, #8e9aa6);
        }
        
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            padding: 40px 20px;
        }
        
        .login-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--max-blue, #248bf2), #6c5ce7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .login-text {
            font-size: 16px;
            color: var(--max-text-secondary, #8e9aa6);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
        }
        
        .login-btn {
            background: var(--max-blue, #248bf2);
            border: none;
            border-radius: 40px;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        
        .voice-input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            justify-content: center;
        }
        
        .voice-record-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--max-blue, #248bf2);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s ease, background 0.2s ease;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .voice-record-btn:active {
            transform: scale(0.95);
        }
        
        .voice-record-btn.recording {
            background: #ff4444;
            animation: pulse-red 1s infinite;
            transform: scale(1.05);
        }
        
        .voice-record-btn.recording:active {
            transform: scale(1.05);
        }
        
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }
        
        .recording-timer {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(10px);
            pointer-events: none;
            font-family: monospace;
        }
        
        .voice-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--max-text-secondary, #8e9aa6);
            margin-top: 12px;
            justify-content: center;
        }
        
        .voice-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .voice-hint-text {
            font-size: 13px;
            color: var(--max-text-secondary, #8e9aa6);
            text-align: center;
            margin-top: 8px;
        }
        
        .voice-hold-hint {
            display: inline-block;
            background: rgba(36, 139, 242, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
            font-weight: normal;
        }
        
        #hiddenAudioPlayer {
            display: none;
        }
        
        .toast-message {
            position: fixed;
            bottom: 140px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            z-index: 1100;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            font-size: 14px;
        }
        
        .toast-message.show {
            opacity: 1;
        }
        
        .toast-message.success {
            background: #28a745;
        }
        
        .toast-message.error {
            background: #dc3545;
        }
        
        .toast-message.info {
            background: var(--max-blue, #248bf2);
        }
        
        .microphone-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }
        
        .microphone-modal-content {
            background: var(--max-panel-bg, #17212b);
            border-radius: 28px;
            max-width: 340px;
            width: 90%;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .modal-btn {
            flex: 1;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .modal-btn.primary {
            background: var(--max-blue, #248bf2);
            color: white;
        }
        
        .modal-btn.secondary {
            background: transparent;
            border: 1px solid var(--max-border, #2b3b4a);
            color: var(--max-text, white);
        }
        
        .modal-btn.primary:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 480px) {
            .screen-container {
                padding: 16px;
            }
            .voice-record-btn {
                width: 56px;
                height: 56px;
                font-size: 28px;
            }
            .recording-timer {
                bottom: 100px;
                padding: 8px 20px;
                font-size: 18px;
            }
            .toast-message {
                bottom: 120px;
                padding: 10px 16px;
                font-size: 13px;
            }
            .voice-hint-text {
                font-size: 12px;
            }
        }
        
        @supports (padding: max(0px)) {
            .screen-container {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
            .chat-header {
                padding-top: max(12px, env(safe-area-inset-top));
            }
            .recording-timer {
                bottom: max(120px, env(safe-area-inset-bottom) + 80px);
            }
            .toast-message {
                bottom: max(140px, env(safe-area-inset-bottom) + 100px);
            }
        }
        
        .animated-avatar {
            display: block;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 50%;
            cursor: pointer;
        }
        
        .animated-avatar:hover {
            transform: scale(1.05);
        }
        
        .user-avatar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--max-panel-bg), var(--max-bg));
            width: 80px;
            height: 80px;
        }
        
        .user-avatar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            pointer-events: none;
            animation: avatarPulse 0s ease-out;
        }
        
        @keyframes avatarPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.4);
                opacity: 1;
            }
            100% {
                box-shadow: 0 0 0 15px rgba(74, 158, 255, 0);
                opacity: 0;
            }
        }
        
        .user-avatar:active::after {
            animation: avatarPulse 0.5s ease-out;
        }
        
        @media (max-width: 480px) {
            .user-avatar {
                width: 64px !important;
                height: 64px !important;
            }
            .animated-avatar {
                width: 64px !important;
                height: 64px !important;
            }
        }
        
        .onboarding-container, .context-container, .benefits-container, .final-profile-container, 
        .ask-question-container, .choose-goal-container, .choose-mode-container, .thought-result-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .onboarding-content, .context-content, .benefits-content, .final-profile-content, 
        .ask-question-content, .choose-goal-content, .choose-mode-content, .thought-result-content {
            background: var(--max-panel-bg, #17212b);
            border-radius: 24px;
            padding: 24px;
        }
        
        .onboarding-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .onboarding-subtitle {
            text-align: center;

            margin-bottom: 24px;
        }
        
        .onboarding-text {
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .onboarding-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .onboarding-btn {
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;

        }
        
        .onboarding-btn.primary {
            background: var(--max-blue, #248bf2);

        }
        
        .onboarding-btn.secondary {

        .context-question {

        .context-hint {

        }
        
        .context-input-group {

        }
        
        .context-input {
            flex: 1;

            background: var(--max-input-bg, #1f2c38);

        .context-skip {

        .gender-buttons {

        .gender-btn {

            display: flex;
            flex-direction: column;

        .gender-emoji {

        .benefit-item {

        }
        
        .benefit-stage {

        }
        
        .benefit-desc {

            color: var(--max-text-secondary, #8e9aa6);
        }
        
        .benefits-after {

        .profile-emoji {

        .profile-title {

        }
        
        .profile-text {

        .goals-list {

    <!-- ========== МИКРОФОН ДЛЯ MAX ========== -->
    <script>
        class MaxMicrophoneManager {
            constructor() {
                this.hasPermission = false;
                this.isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                this.isAndroid = /Android/i.test(navigator.userAgent);
            }
            
            async requestMicrophone() {
                console.log('🎤 Запрос микрофона...');
                this.showLoading();
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    this.hasPermission = true;
                    this.hideLoading();
                    this.showToast('✅ Микрофон готов!', 'success');
                    stream.getTracks().forEach(track => track.stop());
                    return true;
                } catch (error) {
                    this.hideLoading();
                    console.error('❌ Ошибка:', error);
                    if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                        this.showPermissionInstructions();
                    } else if (error.name === 'NotFoundError') {
                        this.showToast('❌ Микрофон не найден на устройстве', 'error');
                    } else if (error.name === 'NotReadableError') {
                        this.showToast('❌ Микрофон занят другим приложением', 'error');
                    } else {
                        this.showToast(`❌ Ошибка: ${error.message}`, 'error');
                    }
                    return false;
                }
            }
            
            showPermissionInstructions() {
                let instructions = '';
                if (this.isAndroid) {
                    instructions = '🔊 <b>МИКРОФОН ЗАБЛОКИРОВАН В MAX</b><br><br>1️⃣ Закройте чат с ботом<br>2️⃣ Откройте <b>Настройки</b> телефона<br>3️⃣ <b>Приложения</b> → <b>MAX</b><br>4️⃣ <b>Разрешения</b> → <b>Микрофон</b><br>5️⃣ Выберите <b>Разрешить</b><br><br>6️⃣ Вернитесь и нажмите 🎤 ещё раз';
                } else if (this.isIOS) {
                    instructions = '🎤 <b>МИКРОФОН ЗАБЛОКИРОВАН В MAX</b><br><br>1️⃣ Закройте чат с ботом<br>2️⃣ Откройте <b>Настройки</b> iPhone<br>3️⃣ Прокрутите вниз → найдите <b>MAX</b><br>4️⃣ Включите <b>Микрофон</b><br><br>5️⃣ Вернитесь и нажмите 🎤 ещё раз';
                } else {
                    instructions = '🎤 <b>МИКРОФОН ЗАБЛОКИРОВАН</b><br><br>В настройках браузера разрешите доступ к микрофону.';
                }
                
                const modal = document.createElement('div');
                modal.className = 'microphone-modal';
                modal.innerHTML = `
                    <div class="microphone-modal-content">
                        <div style="font-size:48px;margin-bottom:16px;">🎤</div>
                        <h3 style="margin:0 0 12px 0;">Нужен доступ к микрофону</h3>
                        <div style="color:var(--max-text-secondary,#8e9aa6);line-height:1.6;text-align:left;font-size:14px;">${instructions}</div>
                        <div style="display:flex;gap:12px;margin-top:28px;">
                            <button id="microphoneRetryBtn" class="modal-btn primary">🔄 ПРОВЕРИТЬ</button>
                            <button id="microphoneCloseBtn" class="modal-btn secondary">📱 ЗАКРЫТЬ</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('microphoneRetryBtn')?.addEventListener('click', () => { modal.remove(); this.requestMicrophone(); });
                document.getElementById('microphoneCloseBtn')?.addEventListener('click', () => modal.remove());
            }
            
            showToast(message, type) {
                const toast = document.getElementById('toastMessage');
                if (toast) {
                    toast.textContent = message;
                    toast.className = `toast-message ${type} show`;
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
            }
            
            showLoading() {
                const btn = document.getElementById('voiceRecordBtn');
                if (btn && !btn.disabled) {
                    btn.textContent = '⏳';
                    btn.disabled = true;
                }
            }
            
            hideLoading() {
                const btn = document.getElementById('voiceRecordBtn');
                if (btn) {
                    btn.textContent = '🎤';
                    btn.disabled = false;
                }
            }
        }
        
        window.maxMicrophoneManager = new MaxMicrophoneManager();
        
        window.voiceRecorder = {
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,
            recordingStartTime: null,
            recordingTimer: null,
            stream: null,
            pressTimer: null,
            isLongPress: false
        };
        
        function getSupportedMimeType() {
            const types = ['audio/webm', 'audio/webm;codecs=opus', 'audio/ogg;codecs=opus', 'audio/mp4', 'audio/mpeg'];
            for (const type of types) {
                if (MediaRecorder.isTypeSupported(type)) return type;
            }
            return 'audio/webm';
        }
        
        async function startActualRecording() {
            if (window.voiceRecorder.isRecording) return false;
            
            try {
                window.voiceRecorder.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                const mimeType = getSupportedMimeType();
                window.voiceRecorder.mediaRecorder = new MediaRecorder(window.voiceRecorder.stream, { mimeType });
                window.voiceRecorder.audioChunks = [];
                
                window.voiceRecorder.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) window.voiceRecorder.audioChunks.push(event.data);
                };
                
                window.voiceRecorder.mediaRecorder.onstop = async () => {
                    if (window.voiceRecorder.stream) {
                        window.voiceRecorder.stream.getTracks().forEach(track => track.stop());
                        window.voiceRecorder.stream = null;
                    }
                    
                    if (window.voiceRecorder.audioChunks.length > 0) {
                        const totalSize = window.voiceRecorder.audioChunks.reduce((sum, chunk) => sum + chunk.size, 0);
                        if (totalSize > 5000) {
                            const audioBlob = new Blob(window.voiceRecorder.audioChunks, { type: mimeType });
                            await sendVoiceToServer(audioBlob);
                        } else {
                            window.maxMicrophoneManager.showToast('Запись слишком короткая', 'error');
                        }
                    }
                    window.voiceRecorder.audioChunks = [];
                    window.voiceRecorder.isRecording = false;
                };
                
                window.voiceRecorder.mediaRecorder.start(100);
                window.voiceRecorder.isRecording = true;
                window.voiceRecorder.recordingStartTime = Date.now();
                
                const voiceBtn = document.getElementById('voiceRecordBtn');
                if (voiceBtn) {
                    voiceBtn.textContent = '⏹️';
                    voiceBtn.classList.add('recording');
                }
                
                const voiceStatus = document.getElementById('voiceStatus');
                if (voiceStatus) {
                    voiceStatus.style.display = 'flex';
                }
                
                startRecordingTimerUI();
                
                setTimeout(() => {
                    if (window.voiceRecorder.isRecording) stopVoiceRecording();
                }, 60000);
                
                return true;
            } catch (error) {
                console.error('Recording error:', error);
                window.maxMicrophoneManager.showToast('❌ Ошибка записи', 'error');
                return false;
            }
        }
        
        window.startVoiceRecording = async function() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                window.maxMicrophoneManager.showToast('❌ Ваше устройство не поддерживает голосовой ввод', 'error');
                return false;
            }
            
            if (!window.maxMicrophoneManager.hasPermission) {
                const granted = await window.maxMicrophoneManager.requestMicrophone();
                if (!granted) return false;
            }
            
            return await startActualRecording();
        };
        
        window.stopVoiceRecording = function() {
            if (window.voiceRecorder.mediaRecorder && window.voiceRecorder.isRecording) {
                window.voiceRecorder.mediaRecorder.stop();
                window.voiceRecorder.isRecording = false;
                stopRecordingTimerUI();
                
                const voiceBtn = document.getElementById('voiceRecordBtn');
                if (voiceBtn) {
                    voiceBtn.textContent = '🎤';
                    voiceBtn.classList.remove('recording');
                }
                
                const voiceStatus = document.getElementById('voiceStatus');
                if (voiceStatus) voiceStatus.style.display = 'none';
            }
        };
        
        window.cancelVoiceRecording = function() {
            if (window.voiceRecorder.mediaRecorder && window.voiceRecorder.isRecording) {
                window.voiceRecorder.mediaRecorder.onstop = null;
                window.voiceRecorder.mediaRecorder.stop();
                
                if (window.voiceRecorder.stream) {
                    window.voiceRecorder.stream.getTracks().forEach(track => track.stop());
                    window.voiceRecorder.stream = null;
                }
                
                window.voiceRecorder.isRecording = false;
                window.voiceRecorder.audioChunks = [];
                stopRecordingTimerUI();
                
                const voiceBtn = document.getElementById('voiceRecordBtn');
                if (voiceBtn) {
                    voiceBtn.textContent = '🎤';
                    voiceBtn.classList.remove('recording');
                }
                
                const voiceStatus = document.getElementById('voiceStatus');
                if (voiceStatus) voiceStatus.style.display = 'none';
            }
        };
        
        function startRecordingTimerUI() {
            const timerEl = document.getElementById('recordingTimer');
            if (!timerEl) return;
            if (window.voiceRecorder.recordingTimer) clearInterval(window.voiceRecorder.recordingTimer);
            
            window.voiceRecorder.recordingTimer = setInterval(() => {
                if (window.voiceRecorder.isRecording && window.voiceRecorder.recordingStartTime) {
                    const elapsed = Math.floor((Date.now() - window.voiceRecorder.recordingStartTime) / 1000);
                    timerEl.textContent = `${elapsed}s`;
                    timerEl.style.display = 'block';
                    
                    if (elapsed >= 55) {
                        timerEl.style.background = 'rgba(255,68,68,0.9)';
                    }
                    if (elapsed >= 60) {
                        stopVoiceRecording();
                    }
                }
            }, 200);
        }
        
        function stopRecordingTimerUI() {
            if (window.voiceRecorder.recordingTimer) {
                clearInterval(window.voiceRecorder.recordingTimer);
                window.voiceRecorder.recordingTimer = null;
            }
            const timerEl = document.getElementById('recordingTimer');
            if (timerEl) {
                timerEl.style.display = 'none';
                timerEl.style.background = 'rgba(0,0,0,0.9)';
            }
        }
        
        async function sendVoiceToServer(audioBlob) {
            window.maxMicrophoneManager.showToast('🎙️ Распознаю речь...', 'info');
            
            const formData = new FormData();
            formData.append('user_id', window.maxContext?.user_id || localStorage.getItem('fredi_user_id'));
            formData.append('voice', audioBlob, 'voice.webm');
            
            try {
                const response = await fetch('/api/voice/process', { method: 'POST', body: formData, timeout: 30000 });
                const result = await response.json();
                
                if (result.success) {
                    if (result.recognized_text) {
                        window.maxMicrophoneManager.showToast(`🎤 "${result.recognized_text}"`, 'success');
                        const questionInput = document.getElementById('questionInput');
                        if (questionInput) {
                            questionInput.value = result.recognized_text;
                            const sendBtn = document.getElementById('sendQuestionBtn');
                            if (sendBtn && result.recognized_text.length > 3) {
                                setTimeout(() => sendBtn.click(), 500);
                            }
                        }
                    }
                    if (result.answer && window.dashboard && window.dashboard.showFloatingMessage) {
                        window.dashboard.showFloatingMessage(result.answer, 'info');
                    }
                    if (result.audio_url) {
                        const audio = document.getElementById('hiddenAudioPlayer');
                        if (audio) {
                            audio.src = result.audio_url;
                            audio.play().catch(e => console.warn('Audio play error:', e));
                        }
                    }
                } else {
                    window.maxMicrophoneManager.showToast(result.error || 'Не удалось распознать речь', 'error');
                }
            } catch (error) {
                console.error('Send voice error:', error);
                window.maxMicrophoneManager.showToast('❌ Ошибка отправки голоса', 'error');
            }
        }
        
        function initVoiceButton() {
            const voiceBtn = document.getElementById('voiceRecordBtn');
            if (!voiceBtn) return;
            
            let pressTimer = null;
            let isPressing = false;
            
            function onPointerDown(e) {
                e.preventDefault();
                if (isPressing) return;
                isPressing = true;
                
                voiceBtn.style.transform = 'scale(0.95)';
                
                pressTimer = setTimeout(async () => {
                    if (isPressing) {
                        const started = await window.startVoiceRecording();
                        if (!started) {
                            isPressing = false;
                            voiceBtn.style.transform = '';
                        }
                    }
                }, 120);
            }
            
            function onPointerUp(e) {

                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                
                if (window.voiceRecorder.isRecording) {
                    window.stopVoiceRecording();
                }
                
                isPressing = false;
                voiceBtn.style.transform = '';
            }
            
            function onPointerCancel(e) {
                e.preventDefault();
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (window.voiceRecorder.isRecording) {
                    window.cancelVoiceRecording();
                    window.maxMicrophoneManager.showToast('Запись отменена', 'info');
                }
                isPressing = false;
                voiceBtn.style.transform = '';
            }
            
            voiceBtn.addEventListener('pointerdown', onPointerDown);
            voiceBtn.addEventListener('pointerup', onPointerUp);
            voiceBtn.addEventListener('pointercancel', onPointerCancel);
            voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
            
            console.log('🎤 Голосовая кнопка инициализирована (удержание для записи)');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initVoiceButton();
            
            if (window.maxMicrophoneManager.isIOS) {
                document.body.addEventListener('touchstart', () => {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const audioCtx = new AudioContext();
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                    }
                }, { once: true });
            }
        });
        
        window.sendVoiceToServer = sendVoiceToServer;
        window.showToast = window.maxMicrophoneManager.showToast.bind(window.maxMicrophoneManager);
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(error => console.error('Service Worker error:', error));
            });
        }
    </script>
</body>
</html>
